<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦞 Lobster Claw</title>
  <meta property="og:title" content="Lobster Claw - Catch lobsters with your hands or mouth!">
  <meta property="og:description" content="A webcam-powered game where you grab lobsters using hand pinch gestures or mouth chomps. Built with MediaPipe.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ashleywolf.github.io/lobster-claw/">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦞</text></svg>">
  <meta name="theme-color" content="#020e1f">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #020e1f;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: none;
    }

    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    #nameEntry {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
    }

    .name-entry-card {
      background: #0a1e30;
      border: 2px solid #1a4060;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      max-width: 320px;
      width: 90%;
    }

    #photoPreview {
      border-radius: 50%;
      border: 3px solid #ff5533;
      display: block;
      margin: 0 auto 16px;
    }

    #nameInput {
      width: 100%;
      padding: 12px 16px;
      font-size: 20px;
      border-radius: 8px;
      border: 2px solid #1a4060;
      background: #051520;
      color: #e6fff5;
      text-align: center;
      outline: none;
      font-family: inherit;
    }

    #nameInput:focus {
      border-color: #ff5533;
    }

    #nameSubmit {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 8px;
      border: none;
      background: #ff5533;
      color: white;
      cursor: pointer;
      font-family: inherit;
    }

    #nameSubmit:hover {
      background: #ff7744;
    }
  </style>
</head>
<body>
  <video id="webcam" autoplay playsinline></video>
  <div id="nameEntry" style="display:none;">
    <div class="name-entry-card">
      <canvas id="photoPreview" width="100" height="100"></canvas>
      <input type="text" id="nameInput" maxlength="15" placeholder="Your name" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button id="nameSubmit">SUBMIT SCORE</button>
    </div>
  </div>
  <canvas id="gameCanvas"></canvas>

  <script type="module">
    import {
      FaceLandmarker,
      HandLandmarker,
      FilesetResolver
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.21/vision_bundle.mjs";

    // =========================================================
    // CONFIG
    // =========================================================
    // Create a fine-grained PAT with gist scope only, paste here
    const GIST_TOKEN = "";

    const CFG = {
      GIST_ID: "abc403f076fbff00127762acc1edc187",
      LEADERBOARD_MAX: 50,
      LEADERBOARD_REFRESH: 30000,

      baseLobstersPerSec: 0.5,
      difficultyInterval: 30000,
      difficultySpawnMult: 1.12,
      difficultySpeedMult: 1.08,
      maxDifficultyTier: 8,

      lobsterTypes: [
        { name: "baby",
          bodyTop: "#d45828", bodyMid: "#e87848", bodyBot: "#eeaa80",
          clawOuter: "#c04820", clawInner: "#e89070",
          segLine: "rgba(120,30,0,0.35)", jointColor: "#eeaa80",
          tailColor: "#d06840", tailTip: "#e09060",
          legColor: "#c85838", spotColor: "rgba(90,20,0,0.12)",
          highlight: "rgba(255,220,200,0.25)", eyeColor: "#111",
          size: 65, speed: [1.2, 2.2], points: 1, weight: 5 },
        { name: "regular",
          bodyTop: "#9e1818", bodyMid: "#c43030", bodyBot: "#d86858",
          clawOuter: "#881010", clawInner: "#c86050",
          segLine: "rgba(80,0,0,0.35)", jointColor: "#d87060",
          tailColor: "#b82828", tailTip: "#d05040",
          legColor: "#a02020", spotColor: "rgba(60,0,0,0.1)",
          highlight: "rgba(255,180,160,0.2)", eyeColor: "#111",
          size: 100, speed: [0.8, 1.5], points: 2, weight: 3 },
        { name: "king",
          bodyTop: "#5a0808", bodyMid: "#881818", bodyBot: "#a84040",
          clawOuter: "#4a0404", clawInner: "#884040",
          segLine: "rgba(40,0,0,0.4)", jointColor: "#a06050",
          tailColor: "#701010", tailTip: "#983030",
          legColor: "#601010", spotColor: "rgba(30,0,0,0.1)",
          highlight: "rgba(255,160,140,0.18)", eyeColor: "#ffd700",
          size: 140, speed: [0.5, 1.0], points: 5, weight: 1 },
        { name: "golden",
          bodyTop: "#ffd700", bodyMid: "#ffec80", bodyBot: "#fff4cc",
          clawOuter: "#daa520", clawInner: "#ffe680",
          segLine: "rgba(180,140,0,0.35)", jointColor: "#fff0a0",
          tailColor: "#f0c040", tailTip: "#ffe870",
          legColor: "#daa520", spotColor: "rgba(255,200,0,0.15)",
          highlight: "rgba(255,255,220,0.4)", eyeColor: "#111",
          size: 80, speed: [2.0, 3.0], points: 10, weight: 0 },
      ],

      // Wave spawning
      waveSize: [3, 5],
      waveDuration: 3000,
      breatherDuration: 2000,
      waveGrowth: 0.5,

      // Pufferfish hazard
      pufferfishChance: 0.12,

      // Frenzy mode
      frenzyComboThreshold: 5,
      frenzyDuration: 3000,

      lives: 5,
      mouthOpenThreshold: 0.3,
      catchRadiusMouth: 110,
      catchRadiusHand: 100,
      pinchThreshold: 0.08,
      chompCooldown: 300,
      grabCooldown: 300,

      bubbleCount: 30,

      // Octocat easter egg
      octocatSpawnMin: 75000,
      octocatSpawnMax: 105000,
      octocatSize: 55,
      octocatSpeed: 0.6,
      octocatFreezeDuration: 3000,

      UPPER_LIP: 13,
      LOWER_LIP: 14,
      NOSE_TIP: 1,

      THUMB_TIP: 4,
      INDEX_TIP: 8,
      MIDDLE_TIP: 12,
      WRIST: 0,
      INDEX_MCP: 5,
    };

    // =========================================================
    // AUDIO ENGINE
    // =========================================================
    class AudioEngine {
      constructor() {
        this.ctx = null;
        this.ready = false;
      }

      init() {
        if (this.ready) return;
        try {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
          this.ready = true;
        } catch (e) {
          console.warn("Web Audio not available:", e);
        }
      }

      _noise(duration, volume = 0.3) {
        if (!this.ready) return;
        const sr = this.ctx.sampleRate;
        const len = sr * duration;
        const buf = this.ctx.createBuffer(1, len, sr);
        const data = buf.getChannelData(0);
        for (let i = 0; i < len; i++) {
          data[i] = (Math.random() * 2 - 1) * volume * (1 - i / len);
        }
        return buf;
      }

      splash() {
        if (!this.ready) return;
        const now = this.ctx.currentTime;
        const buf = this._noise(0.25, 0.4);
        const src = this.ctx.createBufferSource();
        src.buffer = buf;
        const bp = this.ctx.createBiquadFilter();
        bp.type = "bandpass";
        bp.frequency.setValueAtTime(800, now);
        bp.frequency.exponentialRampToValueAtTime(200, now + 0.25);
        bp.Q.value = 1.5;
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(0.5, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
        src.connect(bp).connect(gain).connect(this.ctx.destination);
        src.start(now);
        src.stop(now + 0.25);
      }

      grab() {
        if (!this.ready) return;
        const now = this.ctx.currentTime;
        // Snap
        const osc = this.ctx.createOscillator();
        osc.type = "square";
        osc.frequency.setValueAtTime(180, now);
        osc.frequency.exponentialRampToValueAtTime(60, now + 0.08);
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
        osc.connect(gain).connect(this.ctx.destination);
        osc.start(now);
        osc.stop(now + 0.12);
        // Click
        const click = this.ctx.createOscillator();
        click.type = "triangle";
        click.frequency.setValueAtTime(1200, now);
        click.frequency.exponentialRampToValueAtTime(400, now + 0.05);
        const cg = this.ctx.createGain();
        cg.gain.setValueAtTime(0.15, now);
        cg.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
        click.connect(cg).connect(this.ctx.destination);
        click.start(now);
        click.stop(now + 0.06);
      }

      chomp() {
        if (!this.ready) return;
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        osc.type = "square";
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(80, now + 0.12);
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(0.35, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
        osc.connect(gain).connect(this.ctx.destination);
        osc.start(now);
        osc.stop(now + 0.15);
        const click = this.ctx.createOscillator();
        click.type = "sine";
        click.frequency.setValueAtTime(600, now);
        const cg = this.ctx.createGain();
        cg.gain.setValueAtTime(0.2, now);
        cg.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
        click.connect(cg).connect(this.ctx.destination);
        click.start(now);
        click.stop(now + 0.04);
      }

      catchSuccess() {
        if (!this.ready) return;
        const now = this.ctx.currentTime;
        [523, 659, 784].forEach((freq, i) => {
          const osc = this.ctx.createOscillator();
          osc.type = "sine";
          osc.frequency.value = freq;
          const g = this.ctx.createGain();
          g.gain.setValueAtTime(0.12, now + i * 0.06);
          g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.06 + 0.15);
          osc.connect(g).connect(this.ctx.destination);
          osc.start(now + i * 0.06);
          osc.stop(now + i * 0.06 + 0.16);
        });
      }

      fail() {
        if (!this.ready) return;
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.4);
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
        osc.connect(gain).connect(this.ctx.destination);
        osc.start(now);
        osc.stop(now + 0.4);
      }

      gameOver() {
        if (!this.ready) return;
        const now = this.ctx.currentTime;
        [200, 180, 150, 100].forEach((freq, i) => {
          const osc = this.ctx.createOscillator();
          osc.type = "triangle";
          osc.frequency.value = freq;
          const g = this.ctx.createGain();
          g.gain.setValueAtTime(0.25, now + i * 0.18);
          g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.18 + 0.18);
          osc.connect(g).connect(this.ctx.destination);
          osc.start(now + i * 0.18);
          osc.stop(now + i * 0.18 + 0.2);
        });
      }

      pop() {
        if (!this.ready) return;
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        osc.type = "sine";
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(400, now + 0.06);
        const g = this.ctx.createGain();
        g.gain.setValueAtTime(0.15, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
        osc.connect(g).connect(this.ctx.destination);
        osc.start(now);
        osc.stop(now + 0.07);
      }

      octocatCatch() {
        if (!this.ready) return;
        const now = this.ctx.currentTime;
        // Magical rising arpeggio
        [440, 554, 659, 880, 1108].forEach((freq, i) => {
          const osc = this.ctx.createOscillator();
          osc.type = "sine";
          osc.frequency.value = freq;
          const g = this.ctx.createGain();
          g.gain.setValueAtTime(0.1, now + i * 0.07);
          g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.07 + 0.25);
          osc.connect(g).connect(this.ctx.destination);
          osc.start(now + i * 0.07);
          osc.stop(now + i * 0.07 + 0.26);
        });
        // Shimmer noise layer
        const sr = this.ctx.sampleRate;
        const len = sr * 0.5;
        const buf = this.ctx.createBuffer(1, len, sr);
        const data = buf.getChannelData(0);
        for (let i = 0; i < len; i++) {
          data[i] = (Math.random() * 2 - 1) * 0.08 * (1 - i / len);
        }
        const src = this.ctx.createBufferSource();
        src.buffer = buf;
        const hp = this.ctx.createBiquadFilter();
        hp.type = "highpass";
        hp.frequency.value = 3000;
        const sg = this.ctx.createGain();
        sg.gain.setValueAtTime(0.15, now);
        sg.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        src.connect(hp).connect(sg).connect(this.ctx.destination);
        src.start(now);
        src.stop(now + 0.5);
      }

      comboSound(combo) {
        if (!this.ready) return;
        const now = this.ctx.currentTime;
        const freq = 400 + Math.min(combo, 8) * 80;
        const osc = this.ctx.createOscillator();
        osc.type = "sine";
        osc.frequency.value = freq;
        const g = this.ctx.createGain();
        g.gain.setValueAtTime(0.15, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.connect(g).connect(this.ctx.destination);
        osc.start(now);
        osc.stop(now + 0.11);
      }

      pufferfishBuzz() {
        if (!this.ready) return;
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(120, now);
        osc.frequency.linearRampToValueAtTime(60, now + 0.3);
        const g = this.ctx.createGain();
        g.gain.setValueAtTime(0.4, now);
        g.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc.connect(g).connect(this.ctx.destination);
        osc.start(now);
        osc.stop(now + 0.3);
        const osc2 = this.ctx.createOscillator();
        osc2.type = "square";
        osc2.frequency.value = 90;
        const g2 = this.ctx.createGain();
        g2.gain.setValueAtTime(0.2, now + 0.05);
        g2.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
        osc2.connect(g2).connect(this.ctx.destination);
        osc2.start(now + 0.05);
        osc2.stop(now + 0.26);
      }

      frenzyActivate() {
        if (!this.ready) return;
        const now = this.ctx.currentTime;
        [220, 277, 330, 440, 554, 660].forEach((freq, i) => {
          const osc = this.ctx.createOscillator();
          osc.type = i < 3 ? "sawtooth" : "sine";
          osc.frequency.value = freq;
          const g = this.ctx.createGain();
          g.gain.setValueAtTime(0.08, now + i * 0.04);
          g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.04 + 0.4);
          osc.connect(g).connect(this.ctx.destination);
          osc.start(now + i * 0.04);
          osc.stop(now + i * 0.04 + 0.41);
        });
      }

      waveStart() {
        if (!this.ready) return;
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        osc.type = "triangle";
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.setValueAtTime(400, now + 0.1);
        const g = this.ctx.createGain();
        g.gain.setValueAtTime(0.2, now);
        g.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
        osc.connect(g).connect(this.ctx.destination);
        osc.start(now);
        osc.stop(now + 0.25);
      }
    }

    const audio = new AudioEngine();

    // =========================================================
    // STATE
    // =========================================================
    const state = {
      phase: "start",
      score: 0,
      lives: CFG.lives,
      highScore: parseInt(localStorage.getItem("lobsterClaw_high") || "0"),
      lobsters: [],
      bubbles: [],
      particles: [],
      seaweed: [],
      plankton: [],
      floorDecorations: [],
      mouths: [],
      hands: [],
      difficultyTier: 0,
      lastDifficultyUp: 0,
      spawnAccum: 0,
      gameStartTime: 0,
      catchFlash: null,
      combo: 0,
      lastCatchTime: 0,
      shakeUntil: 0,
      frozenUntil: 0,
      octocat: null,
      lastOctocatSpawn: 0,
      faceModelReady: false,
      handModelReady: false,
      transition: null,
      gameOverStartTime: 0,
      depthUpTime: 0,
      leaderboard: [],
      lastLeaderboardFetch: 0,
      playerPhoto: null,
      submittingScore: false,
      scoreSubmitted: false,
      // Wave system
      wavePhase: "wave",
      waveStartTime: 0,
      waveLobstersLeft: 0,
      waveNumber: 0,
      waveSpawnAccum: 0,
      waveAnnouncedTime: 0,
      // Frenzy
      frenzyUntil: 0,
      frenzyTriggered: false,
      catchesSinceLastMiss: 0,
      // Screen juice
      screenFlash: 0,
    };

    // =========================================================
    // CANVAS + VIDEO
    // =========================================================
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const video = document.getElementById("webcam");

    let W, H;
    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      initSeaweed();
      initFloorDecorations();
    }
    resize();
    window.addEventListener("resize", resize);

    // =========================================================
    // MEDIAPIPE
    // =========================================================
    let faceLandmarker = null;
    let handLandmarker = null;
    let camReady = false;
    let lastFaceDetection = 0;
    let lastHandDetection = 0;
    const FACE_INTERVAL = 60;
    const HAND_INTERVAL = 60;

    async function initMediaPipe() {
      try {
        const vision = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.21/wasm"
        );

        // Load face and hand models in parallel
        const [face, hand] = await Promise.allSettled([
          FaceLandmarker.createFromOptions(vision, {
            baseOptions: {
              modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
              delegate: "GPU",
            },
            outputFaceBlendshapes: true,
            outputFacialTransformationMatrixes: false,
            runningMode: "VIDEO",
            numFaces: 4,
          }),
          HandLandmarker.createFromOptions(vision, {
            baseOptions: {
              modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
              delegate: "GPU",
            },
            runningMode: "VIDEO",
            numHands: 4,
          }),
        ]);

        if (face.status === "fulfilled") {
          faceLandmarker = face.value;
          state.faceModelReady = true;
        } else {
          console.warn("Face model failed (GPU), trying CPU...");
          try {
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
              baseOptions: {
                modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                delegate: "CPU",
              },
              outputFaceBlendshapes: true,
              runningMode: "VIDEO",
              numFaces: 4,
            });
            state.faceModelReady = true;
          } catch (e2) { console.error("Face model CPU fallback failed:", e2); }
        }

        if (hand.status === "fulfilled") {
          handLandmarker = hand.value;
          state.handModelReady = true;
        } else {
          console.warn("Hand model failed (GPU), trying CPU...");
          try {
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
              baseOptions: {
                modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                delegate: "CPU",
              },
              runningMode: "VIDEO",
              numHands: 4,
            });
            state.handModelReady = true;
          } catch (e2) { console.error("Hand model CPU fallback failed:", e2); }
        }
      } catch (e) {
        console.error("MediaPipe init failed:", e);
      }
    }

    // =========================================================
    // WEBCAM
    // =========================================================
    async function initWebcam() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } },
          audio: false,
        });
        video.srcObject = stream;
        await new Promise(r => { video.onloadedmetadata = r; });
        await video.play();
        camReady = true;
      } catch (e) {
        console.error("Webcam access failed:", e);
      }
    }

    // =========================================================
    // FACE DETECTION (multi-face)
    // =========================================================
    function detectFaces(now) {
      if (!state.faceModelReady || !camReady) return;
      if (now - lastFaceDetection < FACE_INTERVAL) return;
      lastFaceDetection = now;

      const results = faceLandmarker.detectForVideo(video, now);
      if (!results || !results.faceLandmarks || results.faceLandmarks.length === 0) {
        state.mouths = [];
        return;
      }

      const prevMouths = state.mouths;
      const newMouths = [];

      for (let fi = 0; fi < results.faceLandmarks.length; fi++) {
        const lm = results.faceLandmarks[fi];
        const upperLip = lm[CFG.UPPER_LIP];
        const lowerLip = lm[CFG.LOWER_LIP];
        const mouthX = 1 - (upperLip.x + lowerLip.x) / 2;
        const mouthY = (upperLip.y + lowerLip.y) / 2;

        let jawOpen = 0;
        if (results.faceBlendshapes && results.faceBlendshapes[fi]) {
          for (const bs of results.faceBlendshapes[fi].categories) {
            if (bs.categoryName === "jawOpen") { jawOpen = bs.score; break; }
          }
        }

        const isOpen = jawOpen > CFG.mouthOpenThreshold;

        let lastChompTime = 0;
        let wasMouthOpen = false;
        let bestDist = Infinity;
        for (const pm of prevMouths) {
          const d = (mouthX - pm.x) ** 2 + (mouthY - pm.y) ** 2;
          if (d < bestDist) { bestDist = d; lastChompTime = pm.lastChompTime; wasMouthOpen = pm.mouthOpen; }
        }

        const mouth = { x: mouthX, y: mouthY, jawOpenVal: jawOpen, mouthOpen: isOpen, lastChompTime };

        if (isOpen && !wasMouthOpen && state.phase === "playing") {
          if (now - mouth.lastChompTime > CFG.chompCooldown) {
            mouth.lastChompTime = now;
            attemptCatch(mouthX * W, mouthY * H, now, "mouth");
          }
        }

        newMouths.push(mouth);
      }

      state.mouths = newMouths;
    }

    // =========================================================
    // HAND DETECTION (multi-hand, pinch = grab)
    // =========================================================
    function detectHands(now) {
      if (!state.handModelReady || !camReady) return;
      if (now - lastHandDetection < HAND_INTERVAL) return;
      lastHandDetection = now;

      const results = handLandmarker.detectForVideo(video, now);
      if (!results || !results.landmarks || results.landmarks.length === 0) {
        state.hands = [];
        return;
      }

      const prevHands = state.hands;
      const newHands = [];

      for (let hi = 0; hi < results.landmarks.length; hi++) {
        const lm = results.landmarks[hi];

        // Hand center (average of wrist and middle finger MCP)
        const wrist = lm[CFG.WRIST];
        const mcp = lm[CFG.INDEX_MCP];
        const handX = 1 - (wrist.x + mcp.x) / 2;
        const handY = (wrist.y + mcp.y) / 2;

        // Pinch detection: distance between thumb tip and index tip
        const thumb = lm[CFG.THUMB_TIP];
        const index = lm[CFG.INDEX_TIP];
        const pinchDist = Math.sqrt((thumb.x - index.x) ** 2 + (thumb.y - index.y) ** 2);
        const isPinching = pinchDist < CFG.pinchThreshold;

        // Pinch center (for catch position)
        const pinchX = 1 - (thumb.x + index.x) / 2;
        const pinchY = (thumb.y + index.y) / 2;

        // All fingertip positions (for claw drawing)
        const tips = [4, 8, 12, 16, 20].map(i => ({
          x: 1 - lm[i].x,
          y: lm[i].y
        }));

        // Match to previous hand to carry over lastGrabTime
        let lastGrabTime = 0;
        let wasPinching = false;
        let bestDist = Infinity;
        for (const ph of prevHands) {
          const d = (handX - ph.x) ** 2 + (handY - ph.y) ** 2;
          if (d < bestDist) { bestDist = d; lastGrabTime = ph.lastGrabTime; wasPinching = ph.isPinching; }
        }

        const hand = { x: handX, y: handY, pinchX, pinchY, pinchDist, isPinching, lastGrabTime, tips };

        // Trigger catch on pinch transition (open -> closed)
        if (isPinching && !wasPinching && state.phase === "playing") {
          if (now - hand.lastGrabTime > CFG.grabCooldown) {
            hand.lastGrabTime = now;
            attemptCatch(pinchX * W, pinchY * H, now, "hand");
          }
        }

        newHands.push(hand);
      }

      state.hands = newHands;
    }

    // =========================================================
    // LOBSTER CLASS
    // =========================================================
    class Lobster {
      constructor(tier) {
        const type = CFG.lobsterTypes[tier];
        this.type = type;
        this.size = type.size;
        this.points = type.points;
        this.caught = false;
        this.caughtTime = 0;
        this.offscreen = false;
        this.isPufferfish = false;
        this.trailCounter = 0;

        const speedMult = Math.pow(CFG.difficultySpeedMult, state.difficultyTier);
        const baseSpeed = type.speed[0] + Math.random() * (type.speed[1] - type.speed[0]);
        this.speed = baseSpeed * speedMult;

        this._spawnFromEdge();

        this.legPhase = Math.random() * Math.PI * 2;
        this.legSpeed = 5 + Math.random() * 3;
        this.clawPhase = Math.random() * Math.PI * 2;
        this.wanderPhase = Math.random() * Math.PI * 2;
        this.wanderAmp = 0.3 + Math.random() * 0.5;
        this.antennaPhase = Math.random() * Math.PI * 2;
      }

      _spawnFromEdge() {
        const edge = Math.floor(Math.random() * 4);
        const margin = this.size;
        switch (edge) {
          case 0:
            this.x = -margin;
            this.y = margin + Math.random() * (H - margin * 2);
            this.angle = -Math.PI / 4 + Math.random() * Math.PI / 2;
            break;
          case 1:
            this.x = W + margin;
            this.y = margin + Math.random() * (H - margin * 2);
            this.angle = Math.PI / 2 + Math.random() * Math.PI / 2 + Math.PI / 4;
            break;
          case 2:
            this.x = margin + Math.random() * (W - margin * 2);
            this.y = -margin;
            this.angle = Math.PI / 4 + Math.random() * Math.PI / 2;
            break;
          case 3:
            this.x = margin + Math.random() * (W - margin * 2);
            this.y = H + margin;
            this.angle = -(Math.PI / 4 + Math.random() * Math.PI / 2);
            break;
        }
        this.facingLeft = Math.cos(this.angle) < 0;
      }

      update(dt) {
        if (this.caught) return;
        this.wanderPhase += dt * 1.2;
        const wander = Math.sin(this.wanderPhase) * this.wanderAmp * dt;
        const moveAngle = this.angle + wander;
        this.x += Math.cos(moveAngle) * this.speed;
        this.y += Math.sin(moveAngle) * this.speed;
        this.legPhase += dt * this.legSpeed;
        this.clawPhase += dt * 2;
        this.antennaPhase += dt * 1.5;

        const m = this.size * 3;
        if (this.x < -m || this.x > W + m || this.y < -m || this.y > H + m) {
          this.offscreen = true;
        }
      }

      draw(ctx) {
        // Golden lobster sparkle trail
        if (this.type.name === "golden" && !this.caught) {
          this.trailCounter = (this.trailCounter || 0) + 1;
          if (this.trailCounter % 3 === 0) {
            state.particles.push({
              x: this.x + (Math.random() - 0.5) * this.size * 0.3,
              y: this.y + (Math.random() - 0.5) * this.size * 0.3,
              vx: (Math.random() - 0.5) * 1.5,
              vy: (Math.random() - 0.5) * 1.5,
              life: 0.4 + Math.random() * 0.2,
              maxLife: 0.4 + Math.random() * 0.2,
              r: 2 + Math.random() * 3,
              color: "rgba(255, 215, 0,",
            });
          }
        }

        // Pufferfish drawing (early return)
        if (this.isPufferfish) {
          ctx.save();
          ctx.translate(this.x, this.y);

          if (this.caught && this.caughtTime) {
            const elapsed = performance.now() - this.caughtTime;
            const progress = Math.min(1, elapsed / 400);
            ctx.globalAlpha = 1 - progress;
            const sc = 1 - progress;
            ctx.scale(sc, sc);
            ctx.translate(0, -progress * 30);
          }

          const s = this.size;
          const now = performance.now();
          const spikePulse = 1 + Math.sin(now * 0.006) * 0.15;

          // Reddish/purple glow
          ctx.beginPath();
          ctx.arc(0, 0, s * 0.55, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(180, 50, 120, 0.12)";
          ctx.fill();

          // Body (round yellow-green)
          const bodyGrad = ctx.createRadialGradient(0, -s * 0.05, s * 0.05, 0, 0, s * 0.35);
          bodyGrad.addColorStop(0, "#d4e860");
          bodyGrad.addColorStop(0.6, "#a8c030");
          bodyGrad.addColorStop(1, "#7a9018");
          ctx.fillStyle = bodyGrad;
          ctx.beginPath();
          ctx.arc(0, 0, s * 0.35, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(60, 80, 0, 0.4)";
          ctx.lineWidth = 1.5;
          ctx.stroke();

          // Spikes (10 triangles radiating out)
          ctx.fillStyle = "#8a6020";
          for (let i = 0; i < 10; i++) {
            const angle = (i / 10) * Math.PI * 2;
            const spikeLen = s * 0.18 * spikePulse;
            const baseR = s * 0.32;
            const bx1 = Math.cos(angle - 0.15) * baseR;
            const by1 = Math.sin(angle - 0.15) * baseR;
            const bx2 = Math.cos(angle + 0.15) * baseR;
            const by2 = Math.sin(angle + 0.15) * baseR;
            const tx = Math.cos(angle) * (baseR + spikeLen);
            const ty = Math.sin(angle) * (baseR + spikeLen);
            ctx.beginPath();
            ctx.moveTo(bx1, by1);
            ctx.lineTo(tx, ty);
            ctx.lineTo(bx2, by2);
            ctx.closePath();
            ctx.fill();
          }

          // Belly spots
          ctx.fillStyle = "rgba(180, 160, 80, 0.3)";
          for (let i = 0; i < 5; i++) {
            const sx = Math.sin(i * 2.5) * s * 0.15;
            const sy = Math.cos(i * 2.5) * s * 0.12;
            ctx.beginPath();
            ctx.arc(sx, sy, s * 0.04, 0, Math.PI * 2);
            ctx.fill();
          }

          // Eyes (big surprised)
          ctx.fillStyle = "#fff";
          ctx.beginPath();
          ctx.ellipse(-s * 0.12, -s * 0.1, s * 0.09, s * 0.11, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(s * 0.12, -s * 0.1, s * 0.09, s * 0.11, 0, 0, Math.PI * 2);
          ctx.fill();
          // Pupils
          ctx.fillStyle = "#111";
          ctx.beginPath();
          ctx.arc(-s * 0.1, -s * 0.08, s * 0.04, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(s * 0.1, -s * 0.08, s * 0.04, 0, Math.PI * 2);
          ctx.fill();
          // Eye highlights
          ctx.fillStyle = "rgba(255,255,255,0.6)";
          ctx.beginPath();
          ctx.arc(-s * 0.13, -s * 0.12, s * 0.02, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(s * 0.09, -s * 0.12, s * 0.02, 0, Math.PI * 2);
          ctx.fill();

          // Small mouth (o shape)
          ctx.strokeStyle = "#555";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(0, s * 0.08, s * 0.04, 0, Math.PI * 2);
          ctx.stroke();

          // Warning "!" above
          ctx.fillStyle = "rgba(255, 60, 60, 0.85)";
          ctx.font = `bold ${Math.floor(s * 0.3)}px sans-serif`;
          ctx.textAlign = "center";
          ctx.fillText("!", 0, -s * 0.48);

          ctx.restore();
          return;
        }

        ctx.save();
        ctx.translate(this.x, this.y);

        if (this.caught && this.caughtTime) {
          const elapsed = performance.now() - this.caughtTime;
          const progress = Math.min(1, elapsed / 400);
          ctx.globalAlpha = 1 - progress;
          const sc = 1 - progress;
          ctx.scale(sc, sc);
          ctx.translate(0, -progress * 30);
        }

        const dir = this.facingLeft ? -1 : 1;
        ctx.scale(dir, 1);

        const s = this.size;
        const t = this.type;
        const clawOpen = Math.sin(this.clawPhase) * 0.18 + 0.22;
        const antWag = Math.sin(this.antennaPhase) * 0.15;

        // Shadow
        ctx.fillStyle = "rgba(0,0,0,0.18)";
        ctx.beginPath();
        ctx.ellipse(s * 0.02, s * 0.28, s * 0.48, s * 0.06, 0.05, 0, Math.PI * 2);
        ctx.fill();

        // == TAIL FAN (behind body) ==
        const tailBaseX = -s * 0.52;
        for (let i = -2; i <= 2; i++) {
          if (i === 0) continue;
          const fanLen = s * 0.18;
          const tipX = tailBaseX - Math.cos(i * 0.28) * fanLen;
          const tipY = Math.sin(i * 0.28) * fanLen;
          ctx.fillStyle = t.tailColor;
          ctx.beginPath();
          ctx.moveTo(tailBaseX, i * s * 0.03);
          ctx.quadraticCurveTo(tailBaseX - fanLen * 0.5, tipY * 0.6 + i * s * 0.01, tipX, tipY);
          ctx.quadraticCurveTo(tailBaseX - fanLen * 0.4, tipY * 0.3, tailBaseX, 0);
          ctx.fill();
          ctx.strokeStyle = t.segLine;
          ctx.lineWidth = 0.8;
          ctx.beginPath();
          ctx.moveTo(tailBaseX, i * s * 0.015);
          ctx.quadraticCurveTo(tailBaseX - fanLen * 0.45, tipY * 0.45, tipX, tipY);
          ctx.stroke();
        }
        // Telson
        ctx.fillStyle = t.tailTip;
        ctx.beginPath();
        ctx.moveTo(tailBaseX, -s * 0.04);
        ctx.quadraticCurveTo(tailBaseX - s * 0.12, -s * 0.03, tailBaseX - s * 0.2, 0);
        ctx.quadraticCurveTo(tailBaseX - s * 0.12, s * 0.03, tailBaseX, s * 0.04);
        ctx.closePath();
        ctx.fill();

        // == ABDOMEN (6 segments, back to front) ==
        for (let i = 5; i >= 0; i--) {
          const progress = i / 5;
          const segX = -s * 0.48 + i * s * 0.105;
          const segW = s * 0.115;
          const segHTop = s * (0.11 + progress * 0.04);
          const segHBot = s * (0.12 + progress * 0.05);
          const grad = ctx.createLinearGradient(segX, -segHTop, segX, segHBot);
          grad.addColorStop(0, t.bodyTop);
          grad.addColorStop(0.45, t.bodyMid);
          grad.addColorStop(1, t.bodyBot);
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.moveTo(segX - segW * 0.45, -segHTop);
          ctx.bezierCurveTo(segX, -segHTop - s * 0.01, segX + segW * 0.5, -segHTop + s * 0.01, segX + segW * 0.5, 0);
          ctx.bezierCurveTo(segX + segW * 0.5, segHBot - s * 0.01, segX, segHBot + s * 0.01, segX - segW * 0.45, segHBot);
          ctx.bezierCurveTo(segX - segW * 0.3, segHBot * 0.5, segX - segW * 0.3, -segHTop * 0.5, segX - segW * 0.45, -segHTop);
          ctx.fill();
          if (i < 5) {
            ctx.strokeStyle = t.jointColor;
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.moveTo(segX + segW * 0.48, -segHTop + s * 0.02);
            ctx.lineTo(segX + segW * 0.48, segHBot - s * 0.02);
            ctx.stroke();
          }
          ctx.strokeStyle = t.segLine;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(segX - segW * 0.4, -segHTop + s * 0.015);
          ctx.lineTo(segX - segW * 0.4, segHBot - s * 0.015);
          ctx.stroke();
          ctx.fillStyle = t.spotColor;
          const seed = i * 137.5;
          for (let si = 0; si < 2; si++) {
            const sx = segX + Math.sin(seed + si * 47) * segW * 0.25;
            const sy = Math.cos(seed + si * 83) * segHTop * 0.5;
            ctx.beginPath();
            ctx.arc(sx, sy, s * 0.012, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        // == CARAPACE ==
        const cGrad = ctx.createLinearGradient(0, -s * 0.22, 0, s * 0.22);
        cGrad.addColorStop(0, t.bodyTop);
        cGrad.addColorStop(0.35, t.bodyMid);
        cGrad.addColorStop(1, t.bodyBot);
        ctx.fillStyle = cGrad;
        ctx.beginPath();
        ctx.moveTo(s * 0.08, s * 0.2);
        ctx.bezierCurveTo(s * 0.2, s * 0.22, s * 0.35, s * 0.16, s * 0.42, s * 0.06);
        ctx.lineTo(s * 0.52, 0);
        ctx.lineTo(s * 0.42, -s * 0.05);
        ctx.bezierCurveTo(s * 0.35, -s * 0.2, s * 0.18, -s * 0.25, s * 0.08, -s * 0.22);
        ctx.bezierCurveTo(s * 0.04, -s * 0.15, s * 0.04, s * 0.15, s * 0.08, s * 0.2);
        ctx.fill();
        ctx.strokeStyle = "rgba(0,0,0,0.25)";
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Dorsal ridge
        ctx.strokeStyle = t.segLine;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(s * 0.1, -s * 0.2);
        ctx.bezierCurveTo(s * 0.2, -s * 0.22, s * 0.35, -s * 0.16, s * 0.45, -s * 0.02);
        ctx.stroke();
        // Shell texture
        ctx.fillStyle = t.spotColor;
        for (const [sx, sy] of [[0.2,-0.08],[0.28,-0.12],[0.15,0.05],[0.32,0.02],[0.22,0.1],[0.35,-0.06],[0.18,-0.15]]) {
          ctx.beginPath();
          ctx.arc(s * sx, s * sy, s * 0.014, 0, Math.PI * 2);
          ctx.fill();
        }
        // Light reflection
        ctx.fillStyle = t.highlight;
        ctx.beginPath();
        ctx.ellipse(s * 0.25, -s * 0.1, s * 0.12, s * 0.04, -0.3, 0, Math.PI * 2);
        ctx.fill();

        // == WALKING LEGS ==
        ctx.strokeStyle = t.legColor;
        ctx.lineCap = "round";
        for (let i = 0; i < 4; i++) {
          const lx = s * 0.12 + i * s * 0.06;
          const phase = this.legPhase + i * 0.9;
          const swing = Math.sin(phase) * s * 0.05;
          ctx.lineWidth = Math.max(1.5, s * 0.018);
          const kneeY = s * 0.22 + Math.abs(swing);
          const footY = s * 0.3 + swing * 0.5;
          ctx.beginPath();
          ctx.moveTo(lx, s * 0.16);
          ctx.lineTo(lx - s * 0.02, kneeY);
          ctx.lineTo(lx + s * 0.01 + swing * 0.3, footY);
          ctx.stroke();
          ctx.fillStyle = t.legColor;
          ctx.beginPath();
          ctx.arc(lx + s * 0.01 + swing * 0.3, footY, s * 0.008, 0, Math.PI * 2);
          ctx.fill();
        }
        // Swimmerets
        ctx.lineWidth = 1;
        ctx.strokeStyle = t.jointColor;
        for (let i = 0; i < 5; i++) {
          const sx = -s * 0.4 + i * s * 0.1;
          const sw = Math.sin(this.legPhase + i * 0.6) * s * 0.03;
          ctx.beginPath();
          ctx.moveTo(sx, s * 0.1 + i * s * 0.005);
          ctx.lineTo(sx + sw, s * 0.17);
          ctx.stroke();
        }

        // == CLAWS ==
        this._drawClaw(ctx, s, s * 0.28, -s * 0.16, clawOpen, -1, t, false);
        this._drawClaw(ctx, s, s * 0.28, s * 0.16, clawOpen, 1, t, this.type.name === "king");

        // == ANTENNAE ==
        ctx.strokeStyle = t.legColor;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(s * 0.4, -s * 0.08);
        ctx.bezierCurveTo(s * 0.55, -s * 0.2 + antWag * s * 0.1, s * 0.7, -s * 0.3, s * 0.85, -s * 0.35 + antWag * s * 0.15);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(s * 0.4, s * 0.08);
        ctx.bezierCurveTo(s * 0.55, s * 0.22 - antWag * s * 0.08, s * 0.7, s * 0.28, s * 0.82, s * 0.32 - antWag * s * 0.12);
        ctx.stroke();
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(s * 0.42, -s * 0.04);
        ctx.quadraticCurveTo(s * 0.5, -s * 0.1, s * 0.55, -s * 0.12 + antWag * s * 0.04);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(s * 0.42, s * 0.04);
        ctx.quadraticCurveTo(s * 0.5, s * 0.1, s * 0.55, s * 0.12 - antWag * s * 0.04);
        ctx.stroke();

        // == EYES ==
        ctx.strokeStyle = t.bodyMid;
        ctx.lineWidth = s * 0.03;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(s * 0.38, -s * 0.1);
        ctx.lineTo(s * 0.44, -s * 0.16);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(s * 0.38, s * 0.1);
        ctx.lineTo(s * 0.44, s * 0.16);
        ctx.stroke();
        ctx.fillStyle = "#1a1a1a";
        ctx.beginPath();
        ctx.arc(s * 0.44, -s * 0.16, s * 0.03, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(s * 0.44, s * 0.16, s * 0.03, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        ctx.beginPath();
        ctx.arc(s * 0.448, -s * 0.168, s * 0.012, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(s * 0.448, s * 0.152, s * 0.012, 0, Math.PI * 2);
        ctx.fill();

        // == KING CROWN ==
        if (this.type.name === "king") {
          ctx.fillStyle = "#ffd700";
          ctx.strokeStyle = "#cc9900";
          ctx.lineWidth = 1;
          const crX = s * 0.24, crY = -s * 0.26;
          ctx.beginPath();
          ctx.moveTo(crX - s * 0.08, crY + s * 0.04);
          ctx.lineTo(crX - s * 0.07, crY - s * 0.06);
          ctx.lineTo(crX - s * 0.03, crY);
          ctx.lineTo(crX, crY - s * 0.08);
          ctx.lineTo(crX + s * 0.03, crY);
          ctx.lineTo(crX + s * 0.07, crY - s * 0.06);
          ctx.lineTo(crX + s * 0.08, crY + s * 0.04);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#ff2244";
          ctx.beginPath();
          ctx.arc(crX, crY - s * 0.02, s * 0.015, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#2244ff";
          ctx.beginPath();
          ctx.arc(crX - s * 0.04, crY + s * 0.01, s * 0.01, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(crX + s * 0.04, crY + s * 0.01, s * 0.01, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }

      _drawClaw(ctx, s, cx, cy, openness, side, t, isCrusher) {
        ctx.save();
        ctx.translate(cx, cy);
        const sc = isCrusher ? 1.15 : 1.0;
        // Arm (merus)
        const armLen = s * 0.16 * sc;
        const armW = s * 0.045 * sc;
        const aGrad = ctx.createLinearGradient(0, -armW, 0, armW);
        aGrad.addColorStop(0, t.clawOuter);
        aGrad.addColorStop(1, t.clawInner);
        ctx.fillStyle = aGrad;
        ctx.beginPath();
        ctx.ellipse(armLen * 0.5, 0, armLen * 0.55, armW, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(0,0,0,0.15)";
        ctx.lineWidth = 0.8;
        ctx.stroke();
        // Hand (propodus)
        ctx.save();
        ctx.translate(armLen, 0);
        const handLen = s * 0.14 * sc;
        const handW = s * 0.055 * sc;
        const hGrad = ctx.createLinearGradient(0, -handW, 0, handW);
        hGrad.addColorStop(0, t.clawOuter);
        hGrad.addColorStop(1, t.clawInner);
        ctx.fillStyle = hGrad;
        ctx.beginPath();
        ctx.ellipse(handLen * 0.4, 0, handLen * 0.5, handW, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(0,0,0,0.15)";
        ctx.lineWidth = 0.8;
        ctx.stroke();
        // Fixed finger
        const fLen = s * 0.1 * sc;
        ctx.fillStyle = t.clawOuter;
        ctx.beginPath();
        ctx.moveTo(handLen * 0.7, s * 0.01 * side);
        ctx.quadraticCurveTo(handLen * 0.7 + fLen * 0.5, s * 0.02 * side, handLen * 0.7 + fLen, 0);
        ctx.quadraticCurveTo(handLen * 0.7 + fLen * 0.5, -s * 0.015 * side, handLen * 0.7, -s * 0.005 * side);
        ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.15)";
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          ctx.arc(handLen * 0.75 + i * fLen * 0.25, -s * 0.003 * side, s * 0.006, 0, Math.PI * 2);
          ctx.fill();
        }
        // Movable finger (dactylus)
        ctx.save();
        ctx.translate(handLen * 0.7, -s * 0.01 * side);
        ctx.rotate(-openness * side);
        ctx.fillStyle = t.clawOuter;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(fLen * 0.5, -s * 0.025 * side, fLen, 0);
        ctx.quadraticCurveTo(fLen * 0.5, s * 0.01 * side, 0, s * 0.005 * side);
        ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.15)";
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          ctx.arc(s * 0.01 + i * fLen * 0.25, s * 0.003 * side, s * 0.005, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
        ctx.restore();
        ctx.restore();
      }

      hitTest(px, py, radius) {
        const dx = px - this.x;
        const dy = py - this.y;
        const hitRadius = this.size * 0.5 + radius * 0.3;
        return dx * dx + dy * dy < hitRadius * hitRadius;
      }
    }

    // =========================================================
    // BUBBLES
    // =========================================================
    function initBubbles() {
      state.bubbles = [];
      for (let i = 0; i < CFG.bubbleCount; i++) {
        state.bubbles.push(makeBubble(true));
      }
    }

    function makeBubble(randomY = false) {
      return {
        x: Math.random() * W,
        y: randomY ? Math.random() * H : H + Math.random() * 50,
        r: 2 + Math.random() * 6,
        speed: 0.3 + Math.random() * 0.8,
        wobblePhase: Math.random() * Math.PI * 2,
        wobbleSpeed: 1 + Math.random() * 2,
        opacity: 0.1 + Math.random() * 0.2,
      };
    }

    function updateBubbles(dt) {
      for (const b of state.bubbles) {
        b.y -= b.speed;
        b.wobblePhase += dt * b.wobbleSpeed;
        b.x += Math.sin(b.wobblePhase) * 0.3;
        if (b.y < -b.r * 2) Object.assign(b, makeBubble(false));
      }
    }

    function drawBubbles() {
      for (const b of state.bubbles) {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(120, 200, 255, ${b.opacity})`;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(b.x - b.r * 0.25, b.y - b.r * 0.25, b.r * 0.3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${b.opacity * 0.8})`;
        ctx.fill();
      }
    }

    // =========================================================
    // PLANKTON (ambient particles)
    // =========================================================
    function initPlankton() {
      state.plankton = [];
      const count = 30 + Math.floor(Math.random() * 11);
      for (let i = 0; i < count; i++) {
        state.plankton.push({
          x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random() - 0.5) * 0.3,
          vy: (Math.random() - 0.5) * 0.3,
          r: 1 + Math.random(),
          opacity: 0.08 + Math.random() * 0.12,
          warm: Math.random() > 0.5,
        });
      }
    }

    function updatePlankton() {
      for (const p of state.plankton) {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0) p.x = W;
        if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H;
        if (p.y > H) p.y = 0;
      }
    }

    function drawPlankton() {
      for (const p of state.plankton) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.warm
          ? `rgba(200, 180, 140, ${p.opacity})`
          : `rgba(140, 180, 200, ${p.opacity})`;
        ctx.fill();
      }
    }

    // =========================================================
    // SEAWEED (decorative bottom)
    // =========================================================
    function initSeaweed() {
      state.seaweed = [];
      const count = Math.floor(W / 80);
      for (let i = 0; i < count; i++) {
        const baseX = 40 + i * (W / count) + (Math.random() - 0.5) * 40;
        const frondCount = 2 + Math.floor(Math.random() * 3);
        const fronds = [];
        for (let f = 0; f < frondCount; f++) {
          fronds.push({
            xOff: (Math.random() - 0.5) * 16,
            h: 40 + Math.random() * 80,
            phase: Math.random() * Math.PI * 2,
            speed: 0.8 + Math.random() * 1.2,
            hue: 100 + Math.random() * 40,
          });
        }
        state.seaweed.push({ x: baseX, fronds });
      }
    }

    function drawSeaweed(time) {
      for (const cluster of state.seaweed) {
        for (const fr of cluster.fronds) {
          const fx = cluster.x + fr.xOff;
          const sway = Math.sin(time * 0.001 * fr.speed + fr.phase) * 15;
          ctx.strokeStyle = `hsla(${fr.hue}, 60%, 30%, 0.6)`;
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.moveTo(fx, H);
          ctx.quadraticCurveTo(fx + sway, H - fr.h * 0.6, fx + sway * 0.5, H - fr.h);
          ctx.stroke();
          for (let lf = 0.3; lf <= 0.8; lf += 0.25) {
            const ly = H - fr.h * lf;
            const lx = fx + sway * lf * 0.6;
            const side = ((lf * 10) % 2 < 1) ? 1 : -1;
            ctx.fillStyle = `hsla(${fr.hue}, 50%, 35%, 0.4)`;
            ctx.beginPath();
            ctx.ellipse(lx + side * 6, ly, 8, 3, side * sway * 0.03 + side * 0.3, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }
    }

    // =========================================================
    // OCEAN FLOOR DECORATIONS
    // =========================================================
    function initFloorDecorations() {
      state.floorDecorations = [];
      const count = 8 + Math.floor(Math.random() * 6);
      for (let i = 0; i < count; i++) {
        const kind = Math.floor(Math.random() * 3);
        state.floorDecorations.push({
          x: Math.random() * W,
          y: H - 10 - Math.random() * 35,
          kind,
          size: 5 + Math.random() * 8,
          rot: Math.random() * Math.PI * 2,
          hue: kind === 0 ? 30 + Math.random() * 20 : kind === 1 ? 10 + Math.random() * 30 : 270 + Math.random() * 40,
        });
      }
    }

    function drawFloorDecorations() {
      for (const d of state.floorDecorations) {
        ctx.save();
        ctx.translate(d.x, d.y);
        ctx.rotate(d.rot);
        if (d.kind === 0) {
          // Shell
          ctx.fillStyle = `hsla(${d.hue}, 30%, 50%, 0.3)`;
          ctx.beginPath();
          ctx.ellipse(0, 0, d.size, d.size * 0.6, 0, 0, Math.PI);
          ctx.fill();
          ctx.strokeStyle = `hsla(${d.hue}, 25%, 40%, 0.25)`;
          ctx.lineWidth = 0.8;
          ctx.beginPath();
          ctx.arc(0, -d.size * 0.1, d.size * 0.4, 0.5, Math.PI * 1.5);
          ctx.stroke();
        } else if (d.kind === 1) {
          // Starfish
          ctx.fillStyle = `hsla(${d.hue}, 40%, 45%, 0.3)`;
          ctx.beginPath();
          for (let a = 0; a < 5; a++) {
            const angle = a * Math.PI * 2 / 5 - Math.PI / 2;
            const outerX = Math.cos(angle) * d.size;
            const outerY = Math.sin(angle) * d.size;
            const innerAngle = angle + Math.PI / 5;
            const innerX = Math.cos(innerAngle) * d.size * 0.4;
            const innerY = Math.sin(innerAngle) * d.size * 0.4;
            if (a === 0) ctx.moveTo(outerX, outerY);
            else ctx.lineTo(outerX, outerY);
            ctx.lineTo(innerX, innerY);
          }
          ctx.closePath();
          ctx.fill();
        } else {
          // Sea urchin
          ctx.fillStyle = `hsla(${d.hue}, 35%, 25%, 0.3)`;
          ctx.beginPath();
          ctx.arc(0, 0, d.size * 0.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = `hsla(${d.hue}, 30%, 30%, 0.25)`;
          ctx.lineWidth = 0.7;
          for (let sp = 0; sp < 10; sp++) {
            const angle = sp * Math.PI * 2 / 10;
            ctx.beginPath();
            ctx.moveTo(Math.cos(angle) * d.size * 0.4, Math.sin(angle) * d.size * 0.4);
            ctx.lineTo(Math.cos(angle) * d.size, Math.sin(angle) * d.size);
            ctx.stroke();
          }
        }
        ctx.restore();
      }
    }

    // =========================================================
    // ESCAPE WARNINGS
    // =========================================================
    function drawEscapeWarnings(now) {
      const pulse = 0.5 + Math.sin(now * 0.008) * 0.5;
      for (const lob of state.lobsters) {
        if (lob.caught) continue;
        const margin = lob.size * 2;
        const arrowSize = 10;
        ctx.fillStyle = `rgba(255, 80, 30, ${(0.3 + pulse * 0.5).toFixed(2)})`;
        if (lob.x < margin && lob.x > -lob.size) {
          const ay = Math.max(arrowSize, Math.min(H - arrowSize, lob.y));
          ctx.beginPath();
          ctx.moveTo(4, ay - arrowSize);
          ctx.lineTo(4 + arrowSize, ay);
          ctx.lineTo(4, ay + arrowSize);
          ctx.closePath();
          ctx.fill();
        }
        if (lob.x > W - margin && lob.x < W + lob.size) {
          const ay = Math.max(arrowSize, Math.min(H - arrowSize, lob.y));
          ctx.beginPath();
          ctx.moveTo(W - 4, ay - arrowSize);
          ctx.lineTo(W - 4 - arrowSize, ay);
          ctx.lineTo(W - 4, ay + arrowSize);
          ctx.closePath();
          ctx.fill();
        }
        if (lob.y < margin && lob.y > -lob.size) {
          const ax = Math.max(arrowSize, Math.min(W - arrowSize, lob.x));
          ctx.beginPath();
          ctx.moveTo(ax - arrowSize, 4);
          ctx.lineTo(ax, 4 + arrowSize);
          ctx.lineTo(ax + arrowSize, 4);
          ctx.closePath();
          ctx.fill();
        }
        if (lob.y > H - margin && lob.y < H + lob.size) {
          const ax = Math.max(arrowSize, Math.min(W - arrowSize, lob.x));
          ctx.beginPath();
          ctx.moveTo(ax - arrowSize, H - 4);
          ctx.lineTo(ax, H - 4 - arrowSize);
          ctx.lineTo(ax + arrowSize, H - 4);
          ctx.closePath();
          ctx.fill();
        }
      }
    }

    // =========================================================
    // CATCH PARTICLES
    // =========================================================
    function spawnCatchParticles(x, y, success, type) {
      const count = success ? 18 : 8;
      const color = success
        ? (type === "hand" ? "rgba(255, 180, 50," : "rgba(57, 211, 83,")
        : "rgba(150, 220, 200,";
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 5;
        state.particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 0.4 + Math.random() * 0.4,
          maxLife: 0.4 + Math.random() * 0.4,
          r: 3 + Math.random() * 5,
          color,
        });
      }
    }

    function updateParticles(dt) {
      for (let i = state.particles.length - 1; i >= 0; i--) {
        const p = state.particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.15;
        p.life -= dt;
        if (p.life <= 0) state.particles.splice(i, 1);
      }
    }

    function drawParticles() {
      for (const p of state.particles) {
        const alpha = Math.max(0, p.life / p.maxLife);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI * 2);
        ctx.fillStyle = p.color + alpha.toFixed(2) + ")";
        ctx.fill();
      }
    }

    // =========================================================
    // OCTOCAT EASTER EGG
    // =========================================================
    function spawnOctocat() {
      const s = CFG.octocatSize;
      const edge = Math.floor(Math.random() * 4);
      let x, y, angle;
      switch (edge) {
        case 0: x = -s; y = s + Math.random() * (H - s * 2); angle = -0.3 + Math.random() * 0.6; break;
        case 1: x = W + s; y = s + Math.random() * (H - s * 2); angle = Math.PI - 0.3 + Math.random() * 0.6; break;
        case 2: x = s + Math.random() * (W - s * 2); y = -s; angle = Math.PI / 2 - 0.3 + Math.random() * 0.6; break;
        default: x = s + Math.random() * (W - s * 2); y = H + s; angle = -Math.PI / 2 - 0.3 + Math.random() * 0.6; break;
      }
      state.octocat = {
        x, y, angle, size: s,
        speed: CFG.octocatSpeed,
        wanderPhase: Math.random() * Math.PI * 2,
        tentaclePhase: Math.random() * Math.PI * 2,
      };
    }

    function updateOctocat(dt, now) {
      // Spawn check
      if (!state.octocat) {
        const interval = CFG.octocatSpawnMin + Math.random() * (CFG.octocatSpawnMax - CFG.octocatSpawnMin);
        if (now - state.lastOctocatSpawn > interval && now - state.gameStartTime > 15000) {
          spawnOctocat();
          state.lastOctocatSpawn = now;
        }
        return;
      }
      const o = state.octocat;
      o.wanderPhase += dt * 0.8;
      o.tentaclePhase += dt * 3;
      const wander = Math.sin(o.wanderPhase) * 0.3 * dt;
      o.x += Math.cos(o.angle + wander) * o.speed;
      o.y += Math.sin(o.angle + wander) * o.speed;
      // Despawn when well offscreen
      const m = o.size * 3;
      if (o.x < -m || o.x > W + m || o.y < -m || o.y > H + m) {
        state.octocat = null;
      }
    }

    function drawOctocat() {
      const o = state.octocat;
      if (!o) return;
      ctx.save();
      ctx.translate(o.x, o.y);
      ctx.globalAlpha = 0.35;
      const s = o.size;

      // Head
      ctx.fillStyle = "#2d1a4e";
      ctx.beginPath();
      ctx.arc(0, -s * 0.1, s * 0.35, 0, Math.PI * 2);
      ctx.fill();

      // Ears
      ctx.beginPath();
      ctx.moveTo(-s * 0.28, -s * 0.35);
      ctx.lineTo(-s * 0.15, -s * 0.55);
      ctx.lineTo(-s * 0.05, -s * 0.35);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(s * 0.28, -s * 0.35);
      ctx.lineTo(s * 0.15, -s * 0.55);
      ctx.lineTo(s * 0.05, -s * 0.35);
      ctx.fill();

      // Eyes
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.ellipse(-s * 0.12, -s * 0.15, s * 0.08, s * 0.1, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(s * 0.12, -s * 0.15, s * 0.08, s * 0.1, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#2d1a4e";
      ctx.beginPath();
      ctx.arc(-s * 0.1, -s * 0.13, s * 0.04, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(s * 0.1, -s * 0.13, s * 0.04, 0, Math.PI * 2);
      ctx.fill();

      // Tentacles (5 wavy arms)
      ctx.strokeStyle = "#2d1a4e";
      ctx.lineCap = "round";
      for (let i = 0; i < 5; i++) {
        const baseAngle = -0.5 + i * 0.25;
        const sway = Math.sin(o.tentaclePhase + i * 1.2) * 0.15;
        const tx = Math.sin(baseAngle + sway) * s * 0.25;
        const ty = s * 0.15;
        const endX = Math.sin(baseAngle + sway) * s * 0.45;
        const endY = s * 0.5 + Math.sin(o.tentaclePhase + i * 0.8) * s * 0.06;
        ctx.lineWidth = s * 0.06 * (1 - i * 0.08);
        ctx.beginPath();
        ctx.moveTo(tx * 0.5, ty);
        ctx.quadraticCurveTo(tx + Math.sin(o.tentaclePhase + i) * s * 0.08, ty + (endY - ty) * 0.5, endX, endY);
        ctx.stroke();
      }

      ctx.restore();
    }

    function octocatHitTest(hx, hy, radius) {
      if (!state.octocat) return false;
      const o = state.octocat;
      const dx = hx - o.x;
      const dy = hy - o.y;
      const hitR = o.size * 0.4 + radius * 0.3;
      return dx * dx + dy * dy < hitR * hitR;
    }

    // =========================================================
    // CATCH LOGIC
    // =========================================================
    function attemptCatch(hx, hy, now, method) {
      let caught = false;
      const radius = method === "hand" ? CFG.catchRadiusHand : CFG.catchRadiusMouth;

      if (method === "hand") { audio.grab(); } else { audio.splash(); }
      spawnCatchParticles(hx, hy, false, method);

      // Octocat easter egg check (before lobsters)
      if (octocatHitTest(hx, hy, radius)) {
        audio.octocatCatch();
        // Golden particle burst
        for (let i = 0; i < 25; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 3 + Math.random() * 6;
          state.particles.push({
            x: state.octocat.x, y: state.octocat.y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 0.6 + Math.random() * 0.5,
            maxLife: 0.6 + Math.random() * 0.5,
            r: 4 + Math.random() * 6,
            color: "rgba(255, 215, 0,",
          });
        }
        state.frozenUntil = now + CFG.octocatFreezeDuration;
        state.catchFlash = { x: state.octocat.x, y: state.octocat.y, time: now, points: 0, combo: 0, method: "octocat" };
        state.octocat = null;
        return;
      }

      for (let i = state.lobsters.length - 1; i >= 0; i--) {
        const lob = state.lobsters[i];
        if (lob.caught) continue;
        if (lob.hitTest(hx, hy, radius)) {
          lob.caught = true;
          caught = true;

          // Pufferfish hazard
          if (lob.isPufferfish) {
            state.lives--;
            state.shakeUntil = now + 400;
            audio.pufferfishBuzz();
            // Red/purple particles
            for (let pi = 0; pi < 20; pi++) {
              const angle = Math.random() * Math.PI * 2;
              const speed = 2 + Math.random() * 5;
              state.particles.push({
                x: lob.x, y: lob.y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: 0.5 + Math.random() * 0.3,
                maxLife: 0.5 + Math.random() * 0.3,
                r: 3 + Math.random() * 5,
                color: Math.random() > 0.5 ? "rgba(255, 50, 50," : "rgba(160, 50, 200,",
              });
            }
            state.catchFlash = { x: lob.x, y: lob.y, time: now, points: 0, combo: 0, method: "pufferfish" };
            state.catchesSinceLastMiss = 0;
            lob.caughtTime = now;
            if (state.lives <= 0) { endGame(now); return; }
            break;
          }

          if (now - state.lastCatchTime < 2000) { state.combo++; } else { state.combo = 1; }
          state.lastCatchTime = now;

          const comboMult = Math.min(state.combo, 5);
          const pts = lob.points * comboMult;
          state.score += pts;

          state.catchFlash = { x: lob.x, y: lob.y, time: now, points: pts, combo: state.combo, method };

          audio.comboSound(state.combo);
          spawnCatchParticles(lob.x, lob.y, true, method);
          lob.caughtTime = now;
          state.screenFlash = now;
          state.catchesSinceLastMiss++;

          // Frenzy trigger
          if (state.catchesSinceLastMiss >= CFG.frenzyComboThreshold && now > state.frenzyUntil) {
            state.frenzyUntil = now + CFG.frenzyDuration;
            state.frenzyTriggered = true;
            audio.frenzyActivate();
            state.catchFlash = { x: lob.x, y: lob.y, time: now, points: pts, combo: state.combo, method: "frenzy" };
          }

          break;
        }
      }

      if (!caught) { audio.pop(); state.catchesSinceLastMiss = 0; }
    }

    // =========================================================
    // SPAWNING
    // =========================================================
    function pickLobsterType() {
      const totalWeight = CFG.lobsterTypes.reduce((s, t) => s + t.weight, 0);
      let r = Math.random() * totalWeight;
      for (let i = 0; i < CFG.lobsterTypes.length; i++) {
        r -= CFG.lobsterTypes[i].weight;
        if (r <= 0) return i;
      }
      return 0;
    }

    function updateSpawning(dt, now) {
      if (now - state.lastDifficultyUp > CFG.difficultyInterval && state.difficultyTier < CFG.maxDifficultyTier) {
        state.difficultyTier++;
        state.lastDifficultyUp = now;
        state.depthUpTime = now;
      }

      if (state.wavePhase === "breather") {
        if (now - state.waveStartTime > CFG.breatherDuration) {
          // Start new wave
          state.wavePhase = "wave";
          state.waveNumber++;
          state.waveStartTime = now;
          state.waveSpawnAccum = 0;
          const minSize = CFG.waveSize[0];
          const maxSize = CFG.waveSize[1] + Math.floor(state.difficultyTier * CFG.waveGrowth);
          state.waveLobstersLeft = minSize + Math.floor(Math.random() * (maxSize - minSize + 1));
          state.waveAnnouncedTime = now;
          audio.waveStart();
          // Spawn golden lobster every 3rd wave
          if (state.waveNumber % 3 === 0) {
            state.lobsters.push(new Lobster(3));
          }
          // Pufferfish chance
          if (Math.random() < CFG.pufferfishChance) {
            const pf = new Lobster(0);
            pf.isPufferfish = true;
            pf.points = -1;
            pf.size = 70;
            state.lobsters.push(pf);
          }
        } else {
          // Straggler during breather (30% chance, checked once per second roughly)
          state.waveSpawnAccum += dt;
          if (state.waveSpawnAccum >= 1) {
            state.waveSpawnAccum -= 1;
            if (Math.random() < 0.3) {
              state.lobsters.push(new Lobster(pickLobsterType()));
            }
          }
        }
      } else {
        // Wave phase: spawn waveLobstersLeft over waveDuration
        if (state.waveLobstersLeft > 0) {
          const spawnRate = state.waveLobstersLeft / (CFG.waveDuration / 1000);
          state.waveSpawnAccum += dt * spawnRate;
          while (state.waveSpawnAccum >= 1 && state.waveLobstersLeft > 0) {
            state.waveSpawnAccum -= 1;
            state.waveLobstersLeft--;
            state.lobsters.push(new Lobster(pickLobsterType()));
          }
        }
        if (state.waveLobstersLeft <= 0 && now - state.waveStartTime >= CFG.waveDuration) {
          state.wavePhase = "breather";
          state.waveStartTime = now;
          state.waveSpawnAccum = 0;
        }
      }
    }

    // =========================================================
    // GAME LOGIC
    // =========================================================
    function updateGame(dt, now) {
      updateSpawning(dt, now);
      updateOctocat(dt, now);

      const frozen = now < state.frozenUntil;
      const inFrenzy = now < state.frenzyUntil;

      for (let i = state.lobsters.length - 1; i >= 0; i--) {
        const lob = state.lobsters[i];
        if (lob.caught && lob.caughtTime && now - lob.caughtTime > 400) {
          state.lobsters.splice(i, 1);
          continue;
        }
        if (!frozen) {
          lob.update(inFrenzy ? dt * 0.4 : dt);
        }
        if (lob.offscreen && !lob.caught) {
          state.lobsters.splice(i, 1);
          state.lives--;
          state.shakeUntil = now + 300;
          audio.fail();
          if (state.lives <= 0) { endGame(now); return; }
        }
      }

      updateBubbles(dt);
      updatePlankton();
      updateParticles(dt);
    }

    function startGame(now) {
      audio.init();
      state.phase = "playing";
      state.score = 0;
      state.lives = CFG.lives;
      state.lobsters = [];
      state.particles = [];
      state.combo = 0;
      state.mouths = [];
      state.hands = [];
      state.difficultyTier = 0;
      state.spawnAccum = 0;
      state.catchFlash = null;
      state.octocat = null;
      state.lastOctocatSpawn = now;
      state.frozenUntil = 0;
      state.gameStartTime = now;
      state.lastDifficultyUp = now;
      state.lastCatchTime = 0;
      state.transition = null;
      state.gameOverStartTime = 0;
      state.depthUpTime = 0;
      state.scoreSubmitted = false;
      state.playerPhoto = null;
      state.submittingScore = false;
      // Wave system reset
      state.wavePhase = "wave";
      state.waveStartTime = now;
      state.waveSpawnAccum = 0;
      state.waveNumber = 1;
      state.waveAnnouncedTime = now;
      const minSize = CFG.waveSize[0];
      const maxSize = CFG.waveSize[1];
      state.waveLobstersLeft = minSize + Math.floor(Math.random() * (maxSize - minSize + 1));
      // Frenzy reset
      state.frenzyUntil = 0;
      state.frenzyTriggered = false;
      state.catchesSinceLastMiss = 0;
      // Screen juice reset
      state.screenFlash = 0;
      initBubbles();
      initPlankton();
      if (performance.now() - state.lastLeaderboardFetch > CFG.LEADERBOARD_REFRESH) {
        fetchLeaderboard();
      }
    }

    function endGame(now) {
      state.phase = "gameover";
      state.gameOverStartTime = now;
      const isNewRecord = state.score > state.highScore && state.score > 0;
      if (state.score > state.highScore) {
        state.highScore = state.score;
        localStorage.setItem("lobsterClaw_high", String(state.highScore));
      }
      if (isNewRecord) {
        for (let i = 0; i < 35; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 2 + Math.random() * 5;
          state.particles.push({
            x: W / 2 + (Math.random() - 0.5) * W * 0.4,
            y: H * 0.25 + (Math.random() - 0.5) * 40,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 2,
            life: 0.8 + Math.random() * 0.6,
            maxLife: 0.8 + Math.random() * 0.6,
            r: 3 + Math.random() * 5,
            color: "rgba(255, 215, 0,",
          });
        }
      }
      audio.gameOver();
      capturePhoto();
      state.scoreSubmitted = false;
      showNameEntry();
    }

    // =========================================================
    // LEADERBOARD
    // =========================================================
    const photoCache = new Map();

    function getPhotoImage(dataUrl) {
      if (!dataUrl) return null;
      if (photoCache.has(dataUrl)) return photoCache.get(dataUrl);
      const img = new Image();
      img.src = dataUrl;
      photoCache.set(dataUrl, img);
      return img;
    }

    function capturePhoto() {
      const size = 100;
      const offscreen = document.createElement('canvas');
      offscreen.width = size;
      offscreen.height = size;
      const offCtx = offscreen.getContext('2d');

      let sx, sy, sSize;
      const vw = video.videoWidth || 640;
      const vh = video.videoHeight || 480;

      if (state.mouths.length > 0) {
        const faceVX = (1 - state.mouths[0].x) * vw;
        const faceVY = state.mouths[0].y * vh;
        sSize = Math.min(vw, vh) * 0.5;
        sx = faceVX - sSize / 2;
        sy = faceVY - sSize / 2;
        // Clamp to video bounds
        sx = Math.max(0, Math.min(sx, vw - sSize));
        sy = Math.max(0, Math.min(sy, vh - sSize));
      } else {
        // Center crop
        sSize = Math.min(vw, vh);
        sx = (vw - sSize) / 2;
        sy = (vh - sSize) / 2;
      }

      // Draw mirrored (selfie cam)
      offCtx.save();
      offCtx.translate(size, 0);
      offCtx.scale(-1, 1);
      offCtx.drawImage(video, sx, sy, sSize, sSize, 0, 0, size, size);
      offCtx.restore();

      state.playerPhoto = offscreen.toDataURL('image/jpeg', 0.6);
    }

    async function fetchLeaderboard() {
      try {
        const resp = await fetch(`https://api.github.com/gists/${CFG.GIST_ID}`, {
          headers: { 'Accept': 'application/vnd.github.v3+json' }
        });
        if (!resp.ok) return;
        const gist = await resp.json();
        const file = gist.files['leaderboard.json'];
        if (file) {
          state.leaderboard = JSON.parse(file.content);
          state.lastLeaderboardFetch = performance.now();
        }
      } catch (e) {
        console.warn('Failed to fetch leaderboard:', e);
      }
    }

    async function submitScore(name, score, photo) {
      if (!GIST_TOKEN || state.submittingScore) return false;
      state.submittingScore = true;
      try {
        const resp = await fetch(`https://api.github.com/gists/${CFG.GIST_ID}`, {
          headers: { 'Accept': 'application/vnd.github.v3+json' }
        });
        if (!resp.ok) { state.submittingScore = false; return false; }
        const gist = await resp.json();
        const file = gist.files['leaderboard.json'];
        let entries = file ? JSON.parse(file.content) : [];

        entries.push({ name, score, photo, ts: Date.now() });
        entries.sort((a, b) => b.score - a.score);
        entries = entries.slice(0, CFG.LEADERBOARD_MAX);

        const updateResp = await fetch(`https://api.github.com/gists/${CFG.GIST_ID}`, {
          method: 'PATCH',
          headers: {
            'Accept': 'application/vnd.github.v3+json',
            'Authorization': `token ${GIST_TOKEN}`,
          },
          body: JSON.stringify({
            files: { 'leaderboard.json': { content: JSON.stringify(entries) } }
          })
        });

        if (updateResp.ok) {
          state.leaderboard = entries;
          state.lastLeaderboardFetch = performance.now();
          state.submittingScore = false;
          state.scoreSubmitted = true;
          return true;
        }
        state.submittingScore = false;
        return false;
      } catch (e) {
        console.warn('Failed to submit score:', e);
        state.submittingScore = false;
        return false;
      }
    }

    function showNameEntry() {
      const overlay = document.getElementById('nameEntry');
      const input = document.getElementById('nameInput');
      const preview = document.getElementById('photoPreview');
      const previewCtx = preview.getContext('2d');

      if (state.playerPhoto) {
        const img = new Image();
        img.onload = () => {
          previewCtx.save();
          previewCtx.beginPath();
          previewCtx.arc(50, 50, 50, 0, Math.PI * 2);
          previewCtx.clip();
          previewCtx.drawImage(img, 0, 0, 100, 100);
          previewCtx.restore();
        };
        img.src = state.playerPhoto;
      }

      input.value = localStorage.getItem('lobsterClaw_name') || '';
      overlay.style.display = 'flex';
      setTimeout(() => input.focus(), 100);
    }

    function hideNameEntry() {
      document.getElementById('nameEntry').style.display = 'none';
    }

    async function handleNameSubmit() {
      const input = document.getElementById('nameInput');
      const name = input.value.trim();
      if (!name) { input.focus(); return; }

      localStorage.setItem('lobsterClaw_name', name);

      const btn = document.getElementById('nameSubmit');
      btn.textContent = 'SUBMITTING...';
      btn.disabled = true;

      const success = await submitScore(name, state.score, state.playerPhoto);

      if (!success && GIST_TOKEN) {
        btn.textContent = 'FAILED - TAP TO RETRY';
        btn.disabled = false;
        return;
      }

      if (!GIST_TOKEN) {
        state.leaderboard.push({ name, score: state.score, photo: state.playerPhoto, ts: Date.now() });
        state.leaderboard.sort((a, b) => b.score - a.score);
        state.leaderboard = state.leaderboard.slice(0, CFG.LEADERBOARD_MAX);
        state.scoreSubmitted = true;
      }

      hideNameEntry();
      btn.textContent = 'SUBMIT SCORE';
      btn.disabled = false;
    }

    document.getElementById('nameSubmit').addEventListener('click', handleNameSubmit);
    document.getElementById('nameInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleNameSubmit();
    });

    // =========================================================
    // RENDERING
    // =========================================================
    function drawOceanBackground(time) {
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, "#020e1f");
      grad.addColorStop(0.25, "#08243d");
      grad.addColorStop(0.55, "#0c3558");
      grad.addColorStop(0.8, "#0a2f4e");
      grad.addColorStop(1, "#071e35");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      // Water surface wave
      ctx.fillStyle = "rgba(20, 60, 100, 0.25)";
      ctx.beginPath();
      ctx.moveTo(0, 0);
      for (let wx = 0; wx <= W; wx += 4) {
        const wy = 10 + Math.sin(wx * 0.015 + time * 0.002) * 5
                  + Math.sin(wx * 0.008 - time * 0.0015) * 3;
        ctx.lineTo(wx, wy);
      }
      ctx.lineTo(W, 0);
      ctx.closePath();
      ctx.fill();

      // Animated caustic light patterns on the ocean floor
      ctx.save();
      ctx.globalAlpha = 0.035;
      const t2 = time * 0.0005;
      for (let i = 0; i < 8; i++) {
        const cx = (W * (0.1 + i * 0.12) + Math.sin(t2 + i * 1.3) * 40) % W;
        const cy = H - 50 + Math.sin(t2 * 0.7 + i) * 15;
        const r = 30 + Math.sin(t2 + i * 0.8) * 15;
        ctx.fillStyle = "#4ac8ff";
        ctx.beginPath();
        ctx.ellipse(cx, cy, r, r * 0.4, Math.sin(t2 + i) * 0.3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();

      // Sandy bottom with rocks
      const sandGrad = ctx.createLinearGradient(0, H - 70, 0, H);
      sandGrad.addColorStop(0, "rgba(140, 120, 80, 0)");
      sandGrad.addColorStop(0.2, "rgba(140, 120, 80, 0.08)");
      sandGrad.addColorStop(1, "rgba(140, 120, 80, 0.18)");
      ctx.fillStyle = sandGrad;
      ctx.fillRect(0, H - 70, W, 70);

      // Rocky formations
      ctx.fillStyle = "rgba(60, 55, 45, 0.25)";
      const rocks = [0.08, 0.25, 0.52, 0.78, 0.93];
      for (const rx of rocks) {
        const rw = 25 + Math.sin(rx * 50) * 15;
        const rh = 12 + Math.sin(rx * 37) * 8;
        ctx.beginPath();
        ctx.ellipse(W * rx, H - 8, rw, rh, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // Light rays from surface
      ctx.save();
      ctx.globalAlpha = 0.025;
      for (let i = 0; i < 6; i++) {
        const x = W * (0.1 + i * 0.16) + Math.sin(time * 0.0003 + i) * 20;
        const spread = 40 + Math.sin(time * 0.0004 + i * 2) * 10;
        ctx.beginPath();
        ctx.moveTo(x - 15, 0);
        ctx.lineTo(x + spread, H);
        ctx.lineTo(x - spread, H);
        ctx.closePath();
        ctx.fillStyle = "#3db8e8";
        ctx.fill();
      }
      ctx.restore();

      // Vignette
      const vigGrad = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.3, W / 2, H / 2, Math.max(W, H) * 0.7);
      vigGrad.addColorStop(0, "rgba(0,0,0,0)");
      vigGrad.addColorStop(1, "rgba(2,8,20,0.35)");
      ctx.fillStyle = vigGrad;
      ctx.fillRect(0, 0, W, H);

      drawFloorDecorations();
      drawSeaweed(time);
    }

    function drawCameraFeed() {
      if (!camReady) return;
      ctx.save();
      ctx.globalAlpha = 0.16;
      ctx.translate(W, 0);
      ctx.scale(-1, 1);
