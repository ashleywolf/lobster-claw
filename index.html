      ctx.drawImage(video, 0, 0, W, H);
      ctx.restore();
    }

    function drawMouthIndicators(now) {
      if (state.mouths.length === 0) return;

      const colors = [
        { open: "57, 211, 83", closed: "150, 220, 200" },
        { open: "255, 150, 50", closed: "255, 200, 120" },
        { open: "200, 100, 255", closed: "180, 150, 255" },
        { open: "255, 100, 150", closed: "255, 180, 200" },
      ];

      for (let mi = 0; mi < state.mouths.length; mi++) {
        const mouth = state.mouths[mi];
        const col = colors[mi % colors.length];
        const hx = mouth.x * W;
        const hy = mouth.y * H;
        const openness = mouth.jawOpenVal;
        const baseRadius = CFG.catchRadiusMouth * 0.5;
        const radius = baseRadius + openness * CFG.catchRadiusMouth * 0.8;
        const isOpen = mouth.mouthOpen;

        ctx.beginPath();
        ctx.arc(hx, hy, radius + 10, 0, Math.PI * 2);
        ctx.fillStyle = isOpen ? `rgba(${col.open}, 0.15)` : `rgba(${col.closed}, 0.08)`;
        ctx.fill();

        const mouthWidth = radius * 1.3;
        const mouthHeight = radius * (0.4 + openness * 1.2);

        ctx.beginPath();
        ctx.ellipse(hx, hy, mouthWidth, mouthHeight, 0, 0, Math.PI * 2);
        ctx.strokeStyle = isOpen ? `rgba(${col.open}, 0.6)` : `rgba(${col.closed}, 0.3)`;
        ctx.lineWidth = 3;
        ctx.stroke();

        if (openness > 0.2) {
          const alpha = Math.min(1, (openness - 0.2) * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.7})`;
          const teethCount = 6;
          for (let i = 0; i < teethCount; i++) {
            const t = (i + 0.5) / teethCount;
            const angle = -Math.PI * 0.8 + t * Math.PI * 1.6;
            const tx = hx + Math.cos(angle) * mouthWidth * 0.85;
            const ty = hy + Math.sin(angle) * mouthHeight * 0.85;
            ctx.beginPath();
            ctx.moveTo(tx - 4, ty);
            ctx.lineTo(tx, ty + 8);
            ctx.lineTo(tx + 4, ty);
            ctx.closePath();
            ctx.fill();
            const bAngle = Math.PI * 0.8 - t * Math.PI * 1.6;
            const bx = hx + Math.cos(bAngle) * mouthWidth * 0.85;
            const by = hy + Math.sin(bAngle) * mouthHeight * 0.85;
            ctx.beginPath();
            ctx.moveTo(bx - 4, by);
            ctx.lineTo(bx, by - 8);
            ctx.lineTo(bx + 4, by);
            ctx.closePath();
            ctx.fill();
          }
        }

        if (isOpen) {
          ctx.beginPath();
          ctx.arc(hx, hy, radius * 0.2, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${col.open}, 0.4)`;
          ctx.fill();
        }
      }
    }

    function drawClawIndicators(now) {
      if (state.hands.length === 0) return;

      const handColors = [
        { grip: "255, 184, 50", idle: "140, 170, 200" },
        { grip: "255, 100, 68", idle: "160, 180, 200" },
        { grip: "68, 220, 255", idle: "180, 190, 210" },
        { grip: "255, 68, 170", idle: "190, 180, 210" },
      ];

      for (let hi = 0; hi < state.hands.length; hi++) {
        const hand = state.hands[hi];
        const col = handColors[hi % handColors.length];
        const px = hand.pinchX * W;
        const py = hand.pinchY * H;
        const grabbing = hand.isPinching;
        const rgb = grabbing ? col.grip : col.idle;

        // Fingertip dots connected by lines (hand skeleton)
        if (hand.tips && hand.tips.length === 5) {
          ctx.strokeStyle = `rgba(${rgb}, ${grabbing ? 0.35 : 0.15})`;
          ctx.lineWidth = 1.5;
          // Connect fingertips in order
          ctx.beginPath();
          for (let ti = 0; ti < hand.tips.length; ti++) {
            const tx = hand.tips[ti].x * W;
            const ty = hand.tips[ti].y * H;
            if (ti === 0) ctx.moveTo(tx, ty); else ctx.lineTo(tx, ty);
          }
          ctx.stroke();
          // Dot at each fingertip
          for (const tip of hand.tips) {
            ctx.fillStyle = `rgba(${rgb}, ${grabbing ? 0.6 : 0.3})`;
            ctx.beginPath();
            ctx.arc(tip.x * W, tip.y * H, grabbing ? 5 : 3.5, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        // Grab zone ring at pinch point
        const radius = grabbing ? CFG.catchRadiusHand * 0.35 : CFG.catchRadiusHand * 0.5;
        ctx.strokeStyle = `rgba(${rgb}, ${grabbing ? 0.5 : 0.2})`;
        ctx.lineWidth = grabbing ? 3 : 2;
        ctx.beginPath();
        ctx.arc(px, py, radius, 0, Math.PI * 2);
        ctx.stroke();

        // Grab flash ripple
        if (grabbing) {
          ctx.fillStyle = `rgba(${col.grip}, 0.15)`;
          ctx.beginPath();
          ctx.arc(px, py, radius * 0.7, 0, Math.PI * 2);
          ctx.fill();
          // Inner glow
          ctx.fillStyle = `rgba(${col.grip}, 0.25)`;
          ctx.beginPath();
          ctx.arc(px, py, radius * 0.35, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function fillRoundedRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arcTo(x + w, y, x + w, y + r, r);
      ctx.lineTo(x + w, y + h - r);
      ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h);
      ctx.arcTo(x, y + h, x, y + h - r, r);
      ctx.lineTo(x, y + r);
      ctx.arcTo(x, y, x + r, y, r);
      ctx.closePath();
      ctx.fill();
    }

    function drawHUD(now) {
      // Pill backgrounds
      ctx.fillStyle = "rgba(0, 10, 20, 0.3)";
      fillRoundedRect(ctx, 10, 8, 155, 62, 10);
      const livesWidth = CFG.lives * 27 + 30;
      ctx.fillStyle = "rgba(0, 10, 20, 0.3)";
      fillRoundedRect(ctx, W - livesWidth - 10, 8, livesWidth, 62, 10);

      ctx.shadowColor = "rgba(0,0,0,0.5)";
      ctx.shadowBlur = 4;
      ctx.fillStyle = "#e6fff5";
      ctx.font = "bold 28px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.textAlign = "left";
      ctx.fillText(`Score: ${state.score}`, 20, 40);

      ctx.font = "16px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.fillStyle = "#8b9e94";
      ctx.fillText(`Best: ${state.highScore}`, 20, 62);

      // Lives (lobster emoji)
      ctx.textAlign = "right";
      ctx.font = "26px sans-serif";
      let livesStr = "";
      for (let i = 0; i < CFG.lives; i++) {
        livesStr += i < state.lives ? "\u{1F99E}" : "\u{1F480}";
      }
      ctx.fillText(livesStr, W - 20, 40);

      ctx.font = "14px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.fillStyle = "#8b9e94";
      ctx.textAlign = "right";
      const elapsed = Math.floor((now - state.gameStartTime) / 1000);
      ctx.fillText(`Depth: ${state.difficultyTier + 1}  |  ${elapsed}s`, W - 20, 62);

      // Tracking status indicators
      ctx.textAlign = "left";
      ctx.font = "12px -apple-system, BlinkMacSystemFont, sans-serif";
      const faceActive = state.mouths.length > 0;
      const handActive = state.hands.length > 0;
      ctx.fillStyle = faceActive ? "rgba(57,211,83,0.7)" : "rgba(139,158,148,0.4)";
      ctx.fillText(faceActive ? "\u{1F444} Mouth active" : "\u{1F444} No face", 20, H - 16);
      ctx.fillStyle = handActive ? "rgba(255,184,50,0.7)" : "rgba(139,158,148,0.4)";
      ctx.fillText(handActive ? "\u{270B} Hand active" : "\u{270B} No hand", 140, H - 16);

      // Combo
      if (state.combo > 1 && now - state.lastCatchTime < 2000) {
        ctx.textAlign = "center";
        ctx.font = "bold 22px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.fillStyle = "#39d353";
        ctx.fillText(`${state.combo}x COMBO`, W / 2, 40);
      }

      // Freeze timer
      if (now < state.frozenUntil) {
        const remaining = ((state.frozenUntil - now) / 1000).toFixed(1);
        ctx.textAlign = "center";
        ctx.font = "bold 20px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.fillStyle = `rgba(255, 215, 0, ${0.6 + Math.sin(now * 0.01) * 0.3})`;
        ctx.fillText(`FROZEN ${remaining}s`, W / 2, 68);
      }

      // Catch flash
      if (state.catchFlash && now - state.catchFlash.time < 1000) {
        const t = (now - state.catchFlash.time) / 1000;
        const alpha = 1 - t;
        const yOff = t * 60;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.textAlign = "center";
        const fontSize = 28 + Math.min(state.catchFlash.combo, 5) * 4;
        ctx.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
        if (state.catchFlash.method === "pufferfish") {
          ctx.fillStyle = "#ff3333";
          ctx.fillText("-1 LIFE! PUFFERFISH!", state.catchFlash.x, state.catchFlash.y - yOff);
        } else if (state.catchFlash.method === "frenzy") {
          ctx.fillStyle = "#dd33ff";
          ctx.font = `bold 42px -apple-system, BlinkMacSystemFont, sans-serif`;
          ctx.fillText("FRENZY!", state.catchFlash.x, state.catchFlash.y - yOff);
        } else {
          ctx.fillStyle = state.catchFlash.method === "octocat" ? "#ffd700" : state.catchFlash.method === "hand" ? "#ffb832" : "#39d353";
          const label = state.catchFlash.method === "octocat" ? "GOLDEN FREEZE!" : state.catchFlash.method === "hand" ? "GRAB!" : "CHOMP!";
          const flashText = state.catchFlash.method === "octocat" ? label : `+${state.catchFlash.points} ${label}`;
          ctx.fillText(flashText, state.catchFlash.x, state.catchFlash.y - yOff);
        }
        ctx.restore();
      }

      // Depth-up notification
      if (state.depthUpTime && now - state.depthUpTime < 2000) {
        const depthElapsed = now - state.depthUpTime;
        let depthAlpha;
        if (depthElapsed < 300) depthAlpha = depthElapsed / 300;
        else if (depthElapsed < 1500) depthAlpha = 1;
        else depthAlpha = 1 - (depthElapsed - 1500) / 500;
        ctx.save();
        ctx.globalAlpha = Math.max(0, depthAlpha);
        ctx.textAlign = "center";
        ctx.font = "bold 36px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.shadowColor = "rgba(74, 200, 255, 0.5)";
        ctx.shadowBlur = 12;
        ctx.fillStyle = "#4ac8ff";
        ctx.fillText(`DEPTH ${state.difficultyTier + 1}`, W / 2, H * 0.15);
        ctx.shadowColor = "transparent";
        ctx.shadowBlur = 0;
        ctx.restore();
      }

      // Wave announcement
      if (state.waveAnnouncedTime && now - state.waveAnnouncedTime < 2000) {
        const waveElapsed = now - state.waveAnnouncedTime;
        let waveAlpha;
        if (waveElapsed < 300) waveAlpha = waveElapsed / 300;
        else if (waveElapsed < 1500) waveAlpha = 1;
        else waveAlpha = 1 - (waveElapsed - 1500) / 500;
        const waveScale = waveElapsed < 300 ? Math.min(1, waveElapsed / 300) : 1;
        ctx.save();
        ctx.globalAlpha = Math.max(0, waveAlpha);
        ctx.translate(W / 2, H * 0.25);
        ctx.scale(waveScale, waveScale);
        ctx.textAlign = "center";
        ctx.font = "bold 44px -apple-system, BlinkMacSystemFont, sans-serif";
        const waveHue = (state.waveNumber * 35) % 360;
        ctx.shadowColor = `hsla(${waveHue}, 80%, 60%, 0.5)`;
        ctx.shadowBlur = 15;
        ctx.fillStyle = `hsl(${waveHue}, 80%, 65%)`;
        ctx.fillText(`WAVE ${state.waveNumber}`, 0, 0);
        ctx.shadowColor = "transparent";
        ctx.shadowBlur = 0;
        ctx.restore();
      }

      // Frenzy HUD
      if (now < state.frenzyUntil) {
        const frenzyPulse = 0.7 + Math.sin(now * 0.01) * 0.3;
        ctx.save();
        ctx.globalAlpha = frenzyPulse;
        ctx.textAlign = "center";
        ctx.font = "bold 28px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.shadowColor = "rgba(200, 50, 255, 0.6)";
        ctx.shadowBlur = 12;
        ctx.fillStyle = "#dd33ff";
        ctx.fillText("FRENZY", W / 2, 96);
        ctx.shadowColor = "transparent";
        ctx.shadowBlur = 0;
        ctx.restore();
      }

      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
    }

    function drawStartScreen(time) {
      drawOceanBackground(time);
      drawBubbles();
      drawPlankton();

      const demoTime = time / 1000;
      const faceOK = state.faceModelReady;
      const handOK = state.handModelReady;
      const anyReady = faceOK || handOK;

      // Demo lobsters swimming in natural loops
      ctx.save();
      ctx.globalAlpha = 0.6;

      // Demo 1 (regular) - figure-8 orbit center-left
      const d1 = new Lobster(1);
      d1.x = W * 0.35 + Math.sin(demoTime * 0.6) * W * 0.12;
      d1.y = H * 0.42 + Math.sin(demoTime * 1.2) * H * 0.06;
      d1.legPhase = demoTime * 5;
      d1.clawPhase = demoTime * 2;
      d1.facingLeft = Math.cos(demoTime * 0.6) < 0;
      d1.draw(ctx);

      // Demo 2 (baby) - circular orbit center-right, faster
      const d2 = new Lobster(0);
      d2.x = W * 0.65 + Math.cos(demoTime * 0.9) * W * 0.08;
      d2.y = H * 0.48 + Math.sin(demoTime * 0.9) * H * 0.05;
      d2.legPhase = demoTime * 7;
      d2.clawPhase = demoTime * 3;
      d2.facingLeft = -Math.sin(demoTime * 0.9) < 0;
      d2.draw(ctx);

      // Demo 3 (king) - slow majestic sweep across bottom third
      const d3 = new Lobster(2);
      d3.x = W * 0.5 + Math.sin(demoTime * 0.3) * W * 0.3;
      d3.y = H * 0.72 + Math.sin(demoTime * 0.6) * H * 0.03;
      d3.legPhase = demoTime * 3;
      d3.clawPhase = demoTime * 1.5;
      d3.facingLeft = Math.cos(demoTime * 0.3) < 0;
      d3.draw(ctx);

      ctx.restore();

      // Animated title with warm glow
      const titleBob = Math.sin(demoTime * 2) * 4;
      ctx.save();
      ctx.textAlign = "center";
      ctx.shadowColor = "rgba(255, 100, 50, 0.6)";
      ctx.shadowBlur = 20;
      ctx.fillStyle = "#ff5533";

      // Lobster emoji to the left of title
      ctx.font = "44px sans-serif";
      ctx.fillText("\u{1F99E}", W / 2 - 165, H * 0.18 + titleBob);

      // "LOBSTER" smaller above
      ctx.font = "bold 30px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.fillText("LOBSTER", W / 2 + 10, H * 0.14 + titleBob);

      // "CLAW" large below
      ctx.font = "bold 60px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.fillText("CLAW", W / 2 + 10, H * 0.22 + titleBob);

      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
      ctx.restore();

      // Loading states
      if (!camReady || !anyReady) {
        // Loading animation: baby lobster orbiting a small circle
        const loadLob = new Lobster(0);
        const loadAngle = demoTime * 2;
        loadLob.x = W / 2 + Math.cos(loadAngle) * 25;
        loadLob.y = H * 0.38 + Math.sin(loadAngle) * 25;
        loadLob.legPhase = demoTime * 8;
        loadLob.clawPhase = demoTime * 3;
        loadLob.facingLeft = Math.sin(loadAngle) > 0;
        ctx.save();
        ctx.globalAlpha = 0.7;
        loadLob.draw(ctx);
        ctx.restore();

        ctx.textAlign = "center";
        ctx.fillStyle = "#8b9e94";
        ctx.font = "16px -apple-system, BlinkMacSystemFont, sans-serif";
        let loadMsg = "Preparing camera...";
        if (camReady && !handOK && !faceOK) loadMsg = "Loading hand tracking...";
        else if (camReady && handOK && !faceOK) loadMsg = "Loading face tracking...";
        else if (camReady && !handOK && faceOK) loadMsg = "Loading hand tracking...";
        ctx.fillText(loadMsg, W / 2, H * 0.46);
        return;
      }

      // Instruction cards
      const cardW = 140;
      const cardH = 100;
      const cardY = H * 0.32;
      const cardGap = 24;
      const cards = [];
      if (handOK) cards.push({ icon: "\u{1F90F}", label: "PINCH to grab" });
      if (faceOK) cards.push({ icon: "\u{1F444}", label: "CHOMP to catch" });

      const totalCardsW = cards.length * cardW + (cards.length - 1) * cardGap;
      const cardsStartX = (W - totalCardsW) / 2;

      ctx.textAlign = "center";
      for (let ci = 0; ci < cards.length; ci++) {
        const cx = cardsStartX + ci * (cardW + cardGap);
        ctx.fillStyle = "rgba(0, 10, 20, 0.4)";
        fillRoundedRect(ctx, cx, cardY, cardW, cardH, 12);
        ctx.font = "36px sans-serif";
        ctx.fillStyle = "#ffffff";
        ctx.fillText(cards[ci].icon, cx + cardW / 2, cardY + 44);
        ctx.font = "bold 13px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.fillStyle = "#c0d8d0";
        ctx.fillText(cards[ci].label, cx + cardW / 2, cardY + cardH - 14);
      }

      // Reminder
      ctx.fillStyle = "#8b9e94";
      ctx.font = "15px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("Don't let them escape! You have 5 lives.", W / 2, cardY + cardH + 32);

      // Start prompt
      const pulse = 0.7 + Math.sin(demoTime * 3) * 0.3;
      ctx.save();
      ctx.globalAlpha = pulse;
      ctx.fillStyle = "#39d353";
      ctx.font = "bold 26px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("TAP TO DIVE IN!", W / 2, cardY + cardH + 72);
      ctx.restore();

      // Top 3 leaderboard
      if (state.leaderboard.length > 0) {
        const lbY = cardY + cardH + 100;
        ctx.save();
        ctx.globalAlpha = 0.7;
        ctx.fillStyle = "#8b9e94";
        ctx.font = "bold 13px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("TOP 3", W / 2, lbY);

        const top3 = state.leaderboard.slice(0, 3);
        for (let i = 0; i < top3.length; i++) {
          const entry = top3[i];
          const rowY = lbY + 18 + i * 42;
          const rowCenterX = W / 2;

          // Circular photo
          const photoImg = getPhotoImage(entry.photo);
          if (photoImg && photoImg.complete && photoImg.naturalWidth > 0) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(rowCenterX - 80, rowY + 8, 18, 0, Math.PI * 2);
            ctx.clip();
            ctx.drawImage(photoImg, rowCenterX - 98, rowY - 10, 36, 36);
            ctx.restore();
          }

          // Rank
          ctx.fillStyle = i === 0 ? "#ffd700" : i === 1 ? "#c0c0c0" : "#cd7f32";
          ctx.font = "bold 14px -apple-system, BlinkMacSystemFont, sans-serif";
          ctx.textAlign = "right";
          ctx.fillText(`${i + 1}.`, rowCenterX - 104, rowY + 13);

          // Name
          ctx.fillStyle = "#c0d8d0";
          ctx.font = "14px -apple-system, BlinkMacSystemFont, sans-serif";
          ctx.textAlign = "left";
          ctx.fillText(entry.name, rowCenterX - 56, rowY + 13);

          // Score
          ctx.fillStyle = "#8b9e94";
          ctx.font = "bold 14px -apple-system, BlinkMacSystemFont, sans-serif";
          ctx.textAlign = "right";
          ctx.fillText(String(entry.score), rowCenterX + 100, rowY + 13);
        }
        ctx.restore();
      }

      // High score badge
      if (state.highScore > 0) {
        const badgeW = 160;
        const badgeH = 32;
        const badgeX = (W - badgeW) / 2;
        const badgeY = H * 0.90 - badgeH / 2;
        ctx.fillStyle = "rgba(255, 215, 0, 0.15)";
        fillRoundedRect(ctx, badgeX, badgeY, badgeW, badgeH, 16);
        ctx.fillStyle = "#ffd700";
        ctx.font = "bold 15px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(`\u{1F3C6} Best: ${state.highScore}`, W / 2, H * 0.90 + 5);
      }
    }

    function drawGameOverScreen(now) {
      drawOceanBackground(now);
      drawBubbles();
      drawPlankton();

      // Animated dark overlay
      const elapsed = now - state.gameOverStartTime;
      const overlayAlpha = Math.min(0.6, elapsed / 500 * 0.6);
      ctx.fillStyle = `rgba(0, 0, 0, ${overlayAlpha})`;
      ctx.fillRect(0, 0, W, H);

      // Escaped lobsters swimming away in background
      const escTime = elapsed / 1000;
      const esc1 = new Lobster(1);
      esc1.x = W * 0.3 - escTime * 40;
      esc1.y = H * 0.45 + Math.sin(escTime * 2) * 20;
      esc1.facingLeft = true;
      esc1.legPhase = escTime * 6;
      esc1.clawPhase = escTime * 2;
      esc1.draw(ctx);

      const esc2 = new Lobster(0);
      esc2.x = W * 0.7 + escTime * 50;
      esc2.y = H * 0.6 + Math.sin(escTime * 2.5 + 1) * 15;
      esc2.facingLeft = false;
      esc2.legPhase = escTime * 7;
      esc2.clawPhase = escTime * 2.5;
      esc2.draw(ctx);

      drawParticles();

      ctx.textAlign = "center";

      // "THEY ESCAPED!" - immediate, scale-in
      if (elapsed > 0) {
        const titleScale = Math.min(1, elapsed / 300);
        ctx.save();
        ctx.translate(W / 2, H * 0.28);
        ctx.scale(titleScale, titleScale);
        ctx.shadowColor = "rgba(248, 81, 73, 0.4)";
        ctx.shadowBlur = 15;
        ctx.fillStyle = "#f85149";
        ctx.font = "bold 52px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.fillText("THEY ESCAPED!", 0, 0);
        ctx.shadowColor = "transparent";
        ctx.shadowBlur = 0;
        ctx.restore();
      }

      // Score - appears after 300ms, slides up
      if (elapsed > 300) {
        const scoreProgress = Math.min(1, (elapsed - 300) / 300);
        const slideUp = (1 - scoreProgress) * 30;
        ctx.save();
        ctx.globalAlpha = scoreProgress;
        ctx.fillStyle = "#e6fff5";
        ctx.font = "bold 38px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.fillText(`Score: ${state.score}`, W / 2, H * 0.42 + slideUp);
        ctx.restore();
      }

      // High score / New record - appears after 500ms
      if (elapsed > 500) {
        const hsProgress = Math.min(1, (elapsed - 500) / 300);
        ctx.save();
        ctx.globalAlpha = hsProgress;
        const isNew = state.score >= state.highScore && state.score > 0;
        if (isNew) {
          ctx.shadowColor = "rgba(255, 215, 0, 0.4)";
          ctx.shadowBlur = 10;
          ctx.fillStyle = "#ffd700";
          ctx.font = "bold 24px -apple-system, BlinkMacSystemFont, sans-serif";
          ctx.fillText("\u{1F3C6} New Record!", W / 2, H * 0.50);
          ctx.shadowColor = "transparent";
          ctx.shadowBlur = 0;
        } else {
          ctx.fillStyle = "#8b9e94";
          ctx.font = "18px -apple-system, BlinkMacSystemFont, sans-serif";
          ctx.fillText(`Best: ${state.highScore}`, W / 2, H * 0.50);
        }
        ctx.restore();
      }

      // Stats - appears after 700ms
      if (elapsed > 700) {
        const statsProgress = Math.min(1, (elapsed - 700) / 300);
        ctx.save();
        ctx.globalAlpha = statsProgress;
        ctx.fillStyle = "#8b9e94";
        ctx.font = "16px -apple-system, BlinkMacSystemFont, sans-serif";
        const duration = Math.floor((now - state.gameStartTime) / 1000);
        ctx.fillText(`Survived ${duration} seconds  |  Reached depth ${state.difficultyTier + 1}`, W / 2, H * 0.58);
        ctx.restore();
      }

      // Leaderboard - appears after 900ms
      if (elapsed > 900 && state.scoreSubmitted && state.leaderboard.length > 0) {
        const lbProgress = Math.min(1, (elapsed - 900) / 400);
        ctx.save();
        ctx.globalAlpha = lbProgress;

        const lbStartY = H * 0.62;
        ctx.fillStyle = "#8b9e94";
        ctx.font = "bold 14px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("LEADERBOARD", W / 2, lbStartY);

        const playerName = localStorage.getItem('lobsterClaw_name') || '';
        const top5 = state.leaderboard.slice(0, 5);
        let playerInTop5 = false;
        const rowH = 36;

        for (let i = 0; i < top5.length; i++) {
          const entry = top5[i];
          const rowY = lbStartY + 12 + i * rowH;
          const isPlayer = entry.name === playerName;
          if (isPlayer) playerInTop5 = true;

          // Highlight current player
          if (isPlayer) {
            ctx.fillStyle = "rgba(255, 85, 51, 0.15)";
            fillRoundedRect(ctx, W / 2 - 130, rowY - 4, 260, rowH - 4, 6);
          }

          // Photo circle
          const photoImg = getPhotoImage(entry.photo);
          if (photoImg && photoImg.complete && photoImg.naturalWidth > 0) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(W / 2 - 80, rowY + 12, 12, 0, Math.PI * 2);
            ctx.clip();
            ctx.drawImage(photoImg, W / 2 - 92, rowY, 24, 24);
            ctx.restore();
          }

          // Rank
          ctx.fillStyle = i === 0 ? "#ffd700" : i === 1 ? "#c0c0c0" : i === 2 ? "#cd7f32" : "#8b9e94";
          ctx.font = "bold 14px -apple-system, BlinkMacSystemFont, sans-serif";
          ctx.textAlign = "right";
          ctx.fillText(`${i + 1}.`, W / 2 - 98, rowY + 17);

          // Name
          ctx.fillStyle = isPlayer ? "#ff5533" : "#c0d8d0";
          ctx.font = "14px -apple-system, BlinkMacSystemFont, sans-serif";
          ctx.textAlign = "left";
          ctx.fillText(entry.name, W / 2 - 62, rowY + 17);

          // Score
          ctx.fillStyle = isPlayer ? "#ff5533" : "#8b9e94";
          ctx.font = "bold 14px -apple-system, BlinkMacSystemFont, sans-serif";
          ctx.textAlign = "right";
          ctx.fillText(String(entry.score), W / 2 + 120, rowY + 17);
        }

        // Show player's rank if not in top 5
        if (!playerInTop5 && playerName) {
          const playerIdx = state.leaderboard.findIndex(e => e.name === playerName);
          if (playerIdx >= 0) {
            const dotsY = lbStartY + 12 + top5.length * rowH;
            ctx.fillStyle = "#8b9e94";
            ctx.font = "14px -apple-system, BlinkMacSystemFont, sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("...", W / 2, dotsY + 8);

            const pEntry = state.leaderboard[playerIdx];
            const pRowY = dotsY + 18;

            ctx.fillStyle = "rgba(255, 85, 51, 0.15)";
            fillRoundedRect(ctx, W / 2 - 130, pRowY - 4, 260, rowH - 4, 6);

            const pPhotoImg = getPhotoImage(pEntry.photo);
            if (pPhotoImg && pPhotoImg.complete && pPhotoImg.naturalWidth > 0) {
              ctx.save();
              ctx.beginPath();
              ctx.arc(W / 2 - 80, pRowY + 12, 12, 0, Math.PI * 2);
              ctx.clip();
              ctx.drawImage(pPhotoImg, W / 2 - 92, pRowY, 24, 24);
              ctx.restore();
            }

            ctx.fillStyle = "#ff5533";
            ctx.font = "bold 14px -apple-system, BlinkMacSystemFont, sans-serif";
            ctx.textAlign = "right";
            ctx.fillText(`${playerIdx + 1}.`, W / 2 - 98, pRowY + 17);

            ctx.font = "14px -apple-system, BlinkMacSystemFont, sans-serif";
            ctx.textAlign = "left";
            ctx.fillText(pEntry.name, W / 2 - 62, pRowY + 17);

            ctx.font = "bold 14px -apple-system, BlinkMacSystemFont, sans-serif";
            ctx.textAlign = "right";
            ctx.fillText(String(pEntry.score), W / 2 + 120, pRowY + 17);
          }
        }

        ctx.restore();
      }

      // Play again - appears after 1200ms
      if (elapsed > 1200) {
        const tapProgress = Math.min(1, (elapsed - 1200) / 300);
        const pulse = 0.7 + Math.sin(now / 1000 * 3) * 0.3;
        ctx.save();
        ctx.globalAlpha = tapProgress * pulse;
        ctx.fillStyle = "#39d353";
        ctx.font = "bold 24px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.fillText("Tap to play again", W / 2, H * 0.95);
        ctx.restore();
      }
    }

    // =========================================================
    // MAIN LOOP
    // =========================================================
    let lastTime = 0;

    function loop(timestamp) {
      requestAnimationFrame(loop);

      const now = timestamp || performance.now();
      const rawDt = lastTime ? (now - lastTime) / 1000 : 0.016;
      const dt = Math.min(rawDt, 0.1);
      lastTime = now;

      let shakeX = 0, shakeY = 0;
      if (now < state.shakeUntil) {
        shakeX = (Math.random() - 0.5) * 8;
        shakeY = (Math.random() - 0.5) * 8;
      }

      ctx.save();
      ctx.translate(shakeX, shakeY);

      // Run detections (staggered for perf)
      detectFaces(now);
      detectHands(now);

      if (state.phase === "start") {
        updateBubbles(dt);
        updatePlankton();
        drawStartScreen(now);
      } else if (state.phase === "playing") {
        updateGame(dt, now);
        drawOceanBackground(now);
        drawCameraFeed();
        drawBubbles();
        drawPlankton();

        // Camera zoom pulse on big combos
        const zoomActive = state.catchFlash && state.combo >= 3 && now - state.catchFlash.time < 200;
        const zoom = zoomActive ? 1 + 0.02 * Math.min(state.combo, 5) : 1;
        if (zoom !== 1) {
          ctx.translate(W / 2, H / 2);
          ctx.scale(zoom, zoom);
          ctx.translate(-W / 2, -H / 2);
        }

        const frozen = now < state.frozenUntil;
        const inFrenzy = now < state.frenzyUntil;

        // Frenzy vignette overlay
        if (inFrenzy) {
          ctx.save();
          const fVig = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.25, W / 2, H / 2, Math.max(W, H) * 0.65);
          fVig.addColorStop(0, "rgba(200, 50, 255, 0)");
          fVig.addColorStop(1, "rgba(200, 50, 255, 0.08)");
          ctx.fillStyle = fVig;
          ctx.fillRect(0, 0, W, H);
          ctx.restore();
        }

        for (const lob of state.lobsters) {
          // Frenzy glow ring behind each lobster
          if (inFrenzy && !lob.caught) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(lob.x, lob.y, lob.size * 0.6, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(200, 50, 255, 0.15)";
            ctx.fill();
            ctx.restore();
          }
          lob.draw(ctx);
          if (frozen && !lob.caught) {
            // Gold tint overlay
            ctx.save();
            ctx.globalAlpha = 0.25 + Math.sin(now * 0.008) * 0.1;
            ctx.fillStyle = "#ffd700";
            ctx.beginPath();
            ctx.ellipse(lob.x, lob.y, lob.size * 0.45, lob.size * 0.25, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }
          // Lobster bubble wake trails
          if (!lob.caught && Math.random() < 0.2) {
            const tailOffX = lob.facingLeft ? lob.size * 0.4 : -lob.size * 0.4;
            state.particles.push({
              x: lob.x + tailOffX + (Math.random() - 0.5) * 10,
              y: lob.y + (Math.random() - 0.5) * 10,
              vx: (Math.random() - 0.5) * 0.5,
              vy: -0.3 - Math.random() * 0.5,
              life: 0.3,
              maxLife: 0.3,
              r: 1 + Math.random(),
              color: "rgba(140, 200, 255,",
            });
          }
        }
        drawOctocat();
        drawEscapeWarnings(now);
        drawParticles();
        drawClawIndicators(now);
        drawMouthIndicators(now);
        drawHUD(now);


      } else if (state.phase === "gameover") {
        updateBubbles(dt);
        updatePlankton();
        updateParticles(dt);
        drawGameOverScreen(now);
      }

      // Transition overlay
      if (state.transition) {
        const tr = state.transition;
        const progress = Math.min(1, (now - tr.startTime) / tr.duration);
        if (progress >= 0.5 && state.phase === tr.from) {
          state.phase = tr.to;
          if (tr.to === "playing") startGame(now);
        }
        let overlayAlpha;
        if (progress < 0.5) {
          overlayAlpha = (progress / 0.5);
        } else {
          overlayAlpha = (1 - progress) / 0.5;
        }
        ctx.fillStyle = `rgba(0, 0, 0, ${overlayAlpha})`;
        ctx.fillRect(0, 0, W, H);
        if (progress >= 1) state.transition = null;
      }

      ctx.restore();
    }

    // =========================================================
    // INPUT
    // =========================================================
    canvas.addEventListener("click", () => {
      audio.init();
      if (state.transition) return;
      const anyModel = state.faceModelReady || state.handModelReady;
      if (state.phase === "start" && camReady && anyModel) {
        state.transition = { from: "start", to: "playing", startTime: performance.now(), duration: 600 };
      } else if (state.phase === "gameover") {
        if (document.getElementById('nameEntry').style.display !== 'none') return;
        state.transition = { from: "gameover", to: "playing", startTime: performance.now(), duration: 600 };
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        audio.init();
        if (state.transition) return;
        const anyModel = state.faceModelReady || state.handModelReady;
        if (state.phase === "start" && camReady && anyModel) {
          state.transition = { from: "start", to: "playing", startTime: performance.now(), duration: 600 };
        } else if (state.phase === "gameover") {
          if (document.getElementById('nameEntry').style.display !== 'none') return;
          state.transition = { from: "gameover", to: "playing", startTime: performance.now(), duration: 600 };
        }
      }
    });

    // =========================================================
    // INIT
    // =========================================================
    async function init() {
      initBubbles();
      initPlankton();
      initSeaweed();
      initFloorDecorations();
      fetchLeaderboard();
      await Promise.all([initWebcam(), initMediaPipe()]);
    }

    init();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
